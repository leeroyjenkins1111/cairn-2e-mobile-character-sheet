name: Apply panic button hotfix on main

on:
  push:
    branches: [main]
    paths:
      - hotfix/panic-button.patch
      - .github/workflows/apply-panic-hotfix-on-main.yml

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  hotfix-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Apply reviewed hotfix
        shell: bash
        run: |
          git apply --check hotfix/panic-button.patch
          git apply hotfix/panic-button.patch

          python3 - <<'PY'
          from pathlib import Path
          import hashlib
          import re

          index = Path('index.html')
          digest = hashlib.sha256(index.read_bytes()).hexdigest()
          expected = 'e11b888125124f7debd5474817aa869b1de6253ed868e3361122e7b4480e9ea7'
          if digest != expected:
              raise SystemExit(f'Unexpected patched index.html SHA-256: {digest}')

          workflow_path = Path('.github/workflows/deploy-pages.yml')
          workflow = workflow_path.read_text(encoding='utf-8')
          workflow, count = re.subn(
              r'(test "\$\(sha256sum index\.html \| cut -d\' \' -f1\)" = ")[0-9a-f]{64}("\s*)',
              rf'\g<1>{digest}\g<2>',
              workflow,
              count=1,
          )
          if count != 1:
              raise SystemExit('Could not update deploy-pages SHA-256 guard.')
          workflow_path.write_text(workflow, encoding='utf-8')
          PY

      - name: Validate JavaScript and embedded tests
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>', text, flags=re.S | re.I)
          if len(scripts) != 1:
              raise SystemExit(f'Expected one inline script, found {len(scripts)}')

          script = scripts[0]
          marker = '  initialize();'
          if script.count(marker) != 1:
              raise SystemExit('Could not locate the single initialization call.')

          prefix = """globalThis.document={querySelector:()=>null,querySelectorAll:()=>[],documentElement:{dataset:{}},body:{append:()=>{}},addEventListener:()=>{},visibilityState:'visible'};globalThis.window={addEventListener:()=>{}};globalThis.navigator={};globalThis.location={search:''};globalThis.localStorage={getItem:()=>null,setItem:()=>{},removeItem:()=>{}};globalThis.requestAnimationFrame=(fn)=>fn();globalThis.HTMLElement=class{};globalThis.HTMLInputElement=class{};globalThis.HTMLTextAreaElement=class{};globalThis.HTMLSelectElement=class{};globalThis.Blob=class{};globalThis.URL={createObjectURL:()=>'',revokeObjectURL:()=>{}};\n"""
          runner = """
          const __results=runDeveloperTests();
          const __failures=__results.filter(result=>!result.pass);
          console.log(JSON.stringify({passed:__results.length-__failures.length,total:__results.length,failures:__failures},null,2));
          if (__failures.length) process.exit(1);
          """
          script = script.replace(marker, runner, 1)
          Path('/tmp/app-tests.js').write_text(prefix + script, encoding='utf-8')
          Path('/tmp/app.js').write_text(scripts[0], encoding='utf-8')

          required = [
              "() => attemptRecoverFromPanic()",
              "normalizeForcedD20({ type: 'click' }) === null",
              "const APP_VERSION = '0.2.1';",
          ]
          for value in required:
              if value not in text:
                  raise SystemExit(f'Missing expected hotfix marker: {value}')
          PY

          node --check /tmp/app.js
          node /tmp/app-tests.js

      - name: Prepare static site
        shell: bash
        run: |
          mkdir -p _site
          cp index.html .nojekyll _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy hotfixed site
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit source hotfix and remove one-time files
        shell: bash
        run: |
          rm hotfix/panic-button.patch
          rmdir hotfix 2>/dev/null || true
          rm .github/workflows/apply-panic-hotfix-on-main.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix panic recovery button handler"
          git push origin HEAD:main
