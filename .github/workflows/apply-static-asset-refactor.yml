name: Apply static asset refactor

on:
  push:
    branches: [refactor/extract-static-assets-v0.14.0]

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: refactor/extract-static-assets-v0.14.0
          fetch-depth: 0

      - name: Apply refactor
        run: python3 scripts/apply-static-asset-refactor.py

      - name: Verify generated structure
        shell: bash
        run: |
          test -f styles/app.css
          test -f scripts/app.js
          ! grep -q '<style' index.html
          ! grep -q '<script>' index.html
          grep -q './styles/app.css' index.html
          grep -q './scripts/app.js' index.html
          git diff --check

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser engines
        run: npx playwright install --with-deps chromium webkit

      - name: Verify deployment checksums
        run: sha256sum -c checksums.sha256

      - name: Check application JavaScript syntax
        run: node --check scripts/app.js

      - name: Run browser regression suite
        id: browser_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run test:ci 2>&1 | tee playwright-output.log

      - name: Upload refactor diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-asset-refactor-diagnostics
          path: |
            playwright-output.log
            test-results
            playwright-report
          if-no-files-found: warn

      - name: Stop when browser tests fail
        if: steps.browser_tests.outcome == 'failure'
        run: exit 1

      - name: Remove bootstrap files
        run: git rm scripts/apply-static-asset-refactor.py .github/workflows/apply-static-asset-refactor.yml

      - name: Commit final refactor
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md checksums.sha256 index.html package.json package-lock.json service-worker.js tests/app.spec.mjs .github/workflows/ci.yml .github/workflows/deploy-pages.yml styles/app.css scripts/app.js
          git commit -m "v0.14.0: extract static application assets"
          git push origin HEAD:refactor/extract-static-assets-v0.14.0
