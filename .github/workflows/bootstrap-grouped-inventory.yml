name: Bootstrap grouped inventory v0.9.0

on:
  push:
    branches:
      - feature/grouped-inventory-v0.9.0

permissions:
  contents: write

concurrency:
  group: bootstrap-grouped-inventory
  cancel-in-progress: false

jobs:
  apply-test-finalize:
    if: ${{ !contains(github.event.head_commit.message || '', '[grouped-inventory-result]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/grouped-inventory-v0.9.0
          fetch-depth: 0

      - name: Apply grouped inventory implementation
        run: python3 scripts/apply_grouped_inventory.py

      - name: Show implementation diff
        run: git status --short && git diff --stat

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser engines
        run: npx playwright install --with-deps chromium webkit

      - name: Verify deployment checksums
        run: sha256sum -c checksums.sha256

      - name: Check inline JavaScript syntax
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          script = html.rsplit('<script>', 1)[1].split('</script>', 1)[0]
          Path('/tmp/cairn-inline.js').write_text(script, encoding='utf-8')
          PY
          node --check /tmp/cairn-inline.js

      - name: Run browser regression suite
        run: npm run test:ci

      - name: Remove bootstrap files and finalize
        shell: bash
        run: |
          rm -f scripts/apply_grouped_inventory.py .github/workflows/bootstrap-grouped-inventory.yml
          rmdir scripts 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement compact grouped inventory v0.9.0 [grouped-inventory-result]"
          git push origin HEAD:feature/grouped-inventory-v0.9.0
