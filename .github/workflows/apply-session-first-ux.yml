# Temporary bootstrap workflow; removes itself after verified generation.
name: Apply session-first UX

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply UX changes
        id: apply_ux
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/apply-session-first-ux.py 2>&1 | tee ux-apply-output.log

      - name: Upload apply diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: session-first-ux-apply-diagnostics
          path: ux-apply-output.log
          if-no-files-found: error

      - name: Stop when UX changes cannot be applied
        if: steps.apply_ux.outcome == 'failure'
        run: exit 1

      - name: Verify generated structure
        shell: bash
        run: |
          grep -q "const APP_VERSION = '0.15.0'" scripts/app.js
          grep -q "session-glance-card" scripts/app.js
          grep -q "Session-first UX v0.15.0" styles/app.css
          grep -q "cairn-mobile-sheet-v0.15.0" service-worker.js
          git diff --check

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser engines
        run: npx playwright install --with-deps chromium webkit

      - name: Verify deployment checksums
        run: sha256sum -c checksums.sha256

      - name: Check application JavaScript syntax
        run: node --check scripts/app.js

      - name: Run browser regression suite
        id: browser_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run test:ci 2>&1 | tee playwright-output.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: session-first-ux-diagnostics
          path: |
            playwright-output.log
            test-results
            playwright-report
          if-no-files-found: warn

      - name: Stop when browser tests fail
        if: steps.browser_tests.outcome == 'failure'
        run: exit 1

      - name: Remove bootstrap files
        run: git rm scripts/apply-session-first-ux.py .github/workflows/apply-session-first-ux.yml

      - name: Commit generated UX changes
        shell: bash
        run: |
          rm -f ux-apply-output.log playwright-output.log
          rm -rf test-results playwright-report
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v0.15.0: introduce session-first visual UX"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
