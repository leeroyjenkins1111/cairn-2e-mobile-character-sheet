# Temporary bootstrap workflow; removed after generated changes are committed.
name: Apply session-first UX

on:
  push:
    branches: [feature/session-first-ux-v0.15.0]
    paths:
      - scripts/apply-session-first-ux.py
      - .github/workflows/apply-session-first-ux.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/session-first-ux-v0.15.0
          fetch-depth: 0

      - name: Apply UX changes
        run: python3 scripts/apply-session-first-ux.py

      - name: Verify generated structure
        shell: bash
        run: |
          grep -q "const APP_VERSION = '0.15.0'" scripts/app.js
          grep -q "session-glance-card" scripts/app.js
          grep -q "Session-first UX v0.15.0" styles/app.css
          grep -q "cairn-mobile-sheet-v0.15.0" service-worker.js
          git diff --check

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser engines
        run: npx playwright install --with-deps chromium webkit

      - name: Verify deployment checksums
        run: sha256sum -c checksums.sha256

      - name: Check application JavaScript syntax
        run: node --check scripts/app.js

      - name: Run browser regression suite
        id: browser_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run test:ci 2>&1 | tee playwright-output.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: session-first-ux-diagnostics
          path: |
            playwright-output.log
            test-results
            playwright-report
          if-no-files-found: warn

      - name: Stop when browser tests fail
        if: steps.browser_tests.outcome == 'failure'
        run: exit 1

      - name: Commit generated UX changes
        shell: bash
        run: |
          rm -f playwright-output.log
          rm -rf test-results playwright-report
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md checksums.sha256 package.json package-lock.json scripts/app.js service-worker.js styles/app.css tests/app.spec.mjs
          git commit -m "v0.15.0: introduce session-first visual UX"
          git push origin HEAD:feature/session-first-ux-v0.15.0
