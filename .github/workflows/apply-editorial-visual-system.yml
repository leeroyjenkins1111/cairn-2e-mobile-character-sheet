name: Finalize editorial visual system

on:
  push:
    branches:
      - feature/editorial-visual-system-v0.17.0

permissions:
  contents: write

jobs:
  verify-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/editorial-visual-system-v0.17.0
          fetch-depth: 0

      - name: Finalize published assets
        run: node scripts/finalize-editorial-visual-system.mjs

      - name: Verify generated structure
        run: |
          test -f styles/editorial.css
          grep -q './styles/editorial.css' index.html
          grep -q 'styles/editorial.css' service-worker.js
          grep -q 'styles/editorial.css' checksums.sha256
          git diff --check

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser engines
        run: npx playwright install --with-deps chromium webkit

      - name: Verify deployment checksums
        run: sha256sum -c checksums.sha256

      - name: Check application JavaScript syntax
        run: node --check scripts/app.js

      - name: Run browser regression suite
        run: npm test

      - name: Remove one-shot files
        if: success()
        run: |
          rm -f scripts/apply-editorial-visual-system.mjs
          rm -f scripts/finalize-editorial-visual-system.mjs
          rm -f .github/workflows/apply-editorial-visual-system.yml

      - name: Commit verified implementation
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add editorial fantasy visual system"
          git push origin HEAD:feature/editorial-visual-system-v0.17.0
