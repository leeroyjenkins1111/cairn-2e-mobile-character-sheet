name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reconstruct single-file application
        shell: bash
        run: |
          cat source/index.xz.*.b64part > index.html.xz.b64
          base64 --decode index.html.xz.b64 > index.html.xz
          xz --decompress --stdout index.html.xz > index.html
          test "$(sha256sum index.html | cut -d' ' -f1)" = "7e8c55c543da2a2e4818aff7e097fa622a80023aa6d872052b05ff6d22cab385"
          rm -f index.html.xz index.html.xz.b64
          touch .nojekyll
          mkdir -p _site
          cp index.html .nojekyll _site/

      - name: Commit reconstructed index.html
        shell: bash
        run: |
          if git diff --quiet -- index.html .nojekyll && git ls-files --error-unmatch index.html >/dev/null 2>&1; then
            echo "index.html is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .nojekyll
          git commit -m "Build deployable single-file application"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
