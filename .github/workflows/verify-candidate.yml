name: Verify candidate

on:
  push:
    branches:
      - feature/product-reliability-offline-session-workflows

permissions:
  contents: write

concurrency:
  group: verify-product-candidate
  cancel-in-progress: true

jobs:
  browser-regression:
    if: ${{ !contains(github.event.head_commit.message || '', '[candidate-syntax-fix]') && !contains(github.event.head_commit.message || '', '[candidate-verified]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/product-reliability-offline-session-workflows
          fetch-depth: 0

      - name: Fix blast helper parameter collision
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import hashlib
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old_signature = 'function openBlastAttackSheet(sourceItem = null, options = {})'
          old_usage = 'const impaired = options.impaired === true;'
          if text.count(old_signature) != 1 or text.count(old_usage) != 1:
              raise SystemExit('Expected blast helper collision markers were not found exactly once.')
          text = text.replace(old_signature, 'function openBlastAttackSheet(sourceItem = null, config = {})', 1)
          text = text.replace(old_usage, 'const impaired = config.impaired === true;', 1)
          path.write_text(text, encoding='utf-8')
          checksum_path = Path('checksums.sha256')
          lines = checksum_path.read_text(encoding='utf-8').splitlines()
          digest = hashlib.sha256(path.read_bytes()).hexdigest()
          lines = [f'{digest}  index.html' if line.endswith('  index.html') else line for line in lines]
          checksum_path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

      - name: Persist syntax fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html checksums.sha256
          git commit -m "Fix blast helper parameter collision [candidate-syntax-fix]"
          git push origin HEAD:feature/product-reliability-offline-session-workflows

      - name: Verify checksums and inline JavaScript
        shell: bash
        run: |
          sha256sum -c checksums.sha256
          python3 - <<'PY'
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          script = html.rsplit('<script>', 1)[1].split('</script>', 1)[0]
          Path('/tmp/cairn-inline.js').write_text(script, encoding='utf-8')
          PY
          node --check /tmp/cairn-inline.js

      - name: Install dependencies
        run: npm ci

      - name: Install browser engines
        run: npx playwright install --with-deps chromium webkit

      - name: Run browser regression suite
        run: npm run test:ci

      - name: Record successful verification
        run: |
          printf '%s\n' 'Syntax, embedded domain tests, Chromium, WebKit, mobile viewport, reduced-motion and offline checks passed.' > BOOTSTRAP_SUCCESS.md
          git add BOOTSTRAP_SUCCESS.md
          git commit -m "Record successful product checks [candidate-verified]"
          git pull --rebase origin feature/product-reliability-offline-session-workflows
          git push origin HEAD:feature/product-reliability-offline-session-workflows
