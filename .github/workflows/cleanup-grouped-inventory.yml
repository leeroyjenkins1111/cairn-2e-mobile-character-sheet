name: Clean grouped inventory branch

on:
  push:
    branches:
      - feature/grouped-inventory-v0.9.0

permissions:
  contents: write

concurrency:
  group: cleanup-grouped-inventory
  cancel-in-progress: false

jobs:
  clean-test-finalize:
    if: ${{ !contains(github.event.head_commit.message || '', '[grouped-inventory-clean]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/grouped-inventory-v0.9.0
          fetch-depth: 0

      - name: Remove generated dependencies and protect branch
        shell: bash
        run: |
          rm -rf node_modules
          printf 'node_modules/\n' > .gitignore

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser engines
        run: npx playwright install --with-deps chromium webkit

      - name: Verify deployment checksums
        run: sha256sum -c checksums.sha256

      - name: Check inline JavaScript syntax
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          script = html.rsplit('<script>', 1)[1].split('</script>', 1)[0]
          Path('/tmp/cairn-inline.js').write_text(script, encoding='utf-8')
          PY
          node --check /tmp/cairn-inline.js

      - name: Run browser regression suite
        run: npm run test:ci

      - name: Final cleanup and commit
        shell: bash
        run: |
          rm -rf node_modules
          rm -f .github/workflows/cleanup-grouped-inventory.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove generated dependencies from grouped inventory branch [grouped-inventory-clean]"
          git push origin HEAD:feature/grouped-inventory-v0.9.0
