name: Apply PR6 screen logic

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.head_ref == 'pr6-screen-logic-dice-feedback'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: pr6-screen-logic-dice-feedback
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Reconstruct implementation and audit scripts
        shell: bash
        run: |
          base64 -d .github/pr6/apply.py.gz.b64 | gzip -d > /tmp/pr6_apply.py
          base64 -d .github/pr6/browser-audit.cjs.gz.b64 | gzip -d > /tmp/pr6_browser_audit.cjs
          python - <<'PY'
          from pathlib import Path
          apply_path = Path('/tmp/pr6_apply.py')
          apply_text = apply_path.read_text(encoding='utf-8')
          old = "test('51. Ochrona ma osobny, wyjaśniający workflow', () => { assert(typeof openProtectionSheet === 'function' && !document.body.textContent.includes('Cairn — szybkie przypadki')); });"
          new = "test('51. Ochrona ma osobny, wyjaśniający workflow', () => { assert(typeof openProtectionSheet === 'function' && combatScenarioDefinitions().every(entry => entry.title !== 'Pierwsza runda')); });"
          if apply_text.count(old) != 1:
              raise SystemExit('Expected one selftest diagnostic to patch')
          apply_path.write_text(apply_text.replace(old, new, 1), encoding='utf-8')

          audit_path = Path('/tmp/pr6_browser_audit.cjs')
          audit_text = audit_path.read_text(encoding='utf-8')
          audit_text = audit_text.replace(
              "        await page.getByRole('button', { name: 'Wczytaj demo' }).click();",
              "        await page.getByRole('button', { name: 'Wczytaj demo' }).click();\n        await page.waitForSelector('.protection-tile');",
              1,
          )
          audit_text = audit_text.replace(
              "      assert(homeText.includes('Ochrona'), 'Protection label missing');",
              "      const protectionLabel = await page.locator('.protection-tile').getAttribute('aria-label');\n      assert((protectionLabel || '').toLowerCase().includes('ochrona'), `Protection label missing: ${protectionLabel}`);",
              1,
          )
          audit_path.write_text(audit_text, encoding='utf-8')
          PY
          python -m py_compile /tmp/pr6_apply.py
          node --check /tmp/pr6_browser_audit.cjs

      - name: Apply screen logic and dice feedback changes
        run: python /tmp/pr6_apply.py

      - name: Correct Polish protection copy
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          replacements = {
            'Po wyzdrowieniu 2k6 wyznacza nowe maksymalną Ochronę.': 'Po wyzdrowieniu 2k6 wyznacza nową maksymalną Ochronę.',
            'Pełny ekwipunek przy Ochrona powyżej 0': 'Pełny ekwipunek przy Ochronie powyżej 0',
            'ma Ochrona powyżej 0': 'ma Ochronę powyżej 0',
            'aktualne i maksymalną Ochronę': 'aktualną i maksymalną Ochronę',
            'Ochrona jest wyższe od 0': 'Ochrona jest wyższa od 0',
            'ma Ochrona wyższe od 0': 'ma Ochronę wyższą niż 0',
            'Pełny ekwipunek: Ochrona ustawiono na 0': 'Pełny ekwipunek: Ochronę ustawiono na 0',
            'Panika: Ochrona ustawiono na 0': 'Panika: Ochronę ustawiono na 0',
            "'Panika i Ochrona'": "'Panika a Ochrona'",
            'Oficjalna tabela Blizn obejmuje utratę od 1 do 12 Ochrona.': 'Oficjalna tabela Blizn obejmuje utratę od 1 do 12 punktów Ochrony.',
            'według liczby utraconej Ochrony': 'według liczby utraconych punktów Ochrony',
            'nie może odzyskiwać Ochronę': 'nie może odzyskiwać Ochrony',
            'Blokuje odzyskiwanie Ochrona': 'Blokuje odzyskiwanie Ochrony',
            'Ochrona nie zostanie przywrócone': 'Ochrona nie zostanie przywrócona',
            'Obrażenia mniejsze od Ochrona': 'Obrażenia mniejsze od Ochrony',
            'Obrażenia sprowadzają Ochrona': 'Obrażenia sprowadzają Ochronę',
            'przy zerowym Ochrona': 'przy zerowej Ochronie',
            'nie przywraca Ochrona': 'nie przywraca Ochrony',
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          old_labels = "body.append(createEl('div', { className: 'form-grid two' }, [field(`${key === 'hp' ? 'Ochrona' : ATTRS[key].label} aktualne`, controls[key].current), field(`${key === 'hp' ? 'Ochrona' : ATTRS[key].label} maksymalne`, controls[key].max)]));"
          new_labels = "body.append(createEl('div', { className: 'form-grid two' }, [field(key === 'hp' ? 'Ochrona aktualna' : `${ATTRS[key].label} aktualne`, controls[key].current), field(key === 'hp' ? 'Ochrona maksymalna' : `${ATTRS[key].label} maksymalne`, controls[key].max)]));"
          if text.count(old_labels) != 1:
              raise SystemExit('Expected one full-stat label row')
          path.write_text(text.replace(old_labels, new_labels, 1), encoding='utf-8')
          PY

      - name: Validate inline JavaScript
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>([\s\S]*?)</script>', text)
          if len(scripts) != 1:
              raise SystemExit(f'Expected one inline script, found {len(scripts)}')
          Path('/tmp/index-inline.js').write_text(scripts[0], encoding='utf-8')
          PY
          node --check /tmp/index-inline.js

      - name: Run browser audit
        id: browser
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.54.1 >/dev/null 2>&1
          npx playwright install chromium >/dev/null
          python -m http.server 4173 >/tmp/pr6-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          sleep 2
          NODE_PATH="$PWD/node_modules" node /tmp/pr6_browser_audit.cjs 2>&1 | tee /tmp/pr6-browser-audit.log

      - name: Upload browser audit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr6-browser-audit
          path: |
            /tmp/pr6-browser-audit.log
            /tmp/pr6-http.log
          if-no-files-found: warn

      - name: Require browser audit success
        if: steps.browser.outcome != 'success'
        run: exit 1

      - name: Commit validated application source
        shell: bash
        run: |
          rm -f package.json package-lock.json
          test "$(sha256sum index.html | cut -d' ' -f1)" = "e663ed2782e0da90382fefba51bd5004271978cf87cd04ffb992759741e2c855"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html
          git commit -m "Clarify screen logic and animate dice feedback"
          git push origin HEAD:pr6-screen-logic-dice-feedback
