# Temporary workflow; removes itself after applying the touch target guard.
name: Fix touch target rounding

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply minimum touch target guard
        shell: bash
        run: |
          set -euo pipefail
          cat >> styles/app.css <<'EOF'

          /* Avoid sub-pixel rounding below the 44px mobile touch target. */
          .btn { min-height: 45px; }
          EOF
          sha256sum index.html manifest.webmanifest service-worker.js icon.svg styles/app.css scripts/app.js > checksums.sha256
          git rm .github/workflows/fix-touch-target-rounding.yml
          git diff --check

      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add styles/app.css checksums.sha256
          git commit -m "fix: preserve minimum mobile touch targets"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
