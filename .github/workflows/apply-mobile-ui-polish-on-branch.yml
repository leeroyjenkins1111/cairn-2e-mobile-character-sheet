name: Apply and validate mobile UI polish

on:
  push:
    branches: [pr4-mobile-ui-polish]
    paths:
      - implementation/apply-mobile-ui-polish.py.gz.b64
      - implementation/mobile-ui-audit.cjs.gz.b64
      - .github/workflows/apply-mobile-ui-polish-on-branch.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: pr4-mobile-ui-polish

      - name: Apply reviewed UI changes when needed
        id: apply
        shell: bash
        run: |
          if grep -q "const APP_VERSION = '0.3.0';" index.html; then
            base64 -d implementation/apply-mobile-ui-polish.py.gz.b64 | gzip -d > /tmp/apply-mobile-ui-polish.py
            python3 /tmp/apply-mobile-ui-polish.py
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif grep -q "const APP_VERSION = '0.4.0';" index.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Unexpected application version" >&2
            exit 1
          fi

      - name: Validate inline JavaScript and embedded tests
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path('index.html').read_text(encoding='utf-8')
          if "const APP_VERSION = '0.4.0';" not in text:
              raise SystemExit('Expected app version 0.4.0.')
          scripts = re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>', text, flags=re.S | re.I)
          if len(scripts) != 1:
              raise SystemExit(f'Expected one inline script, found {len(scripts)}')
          if re.search(r'<(?:script|link)[^>]+(?:src|href)=["\']https?://', text, flags=re.I):
              raise SystemExit('External scripts or styles are not allowed.')
          ids = re.findall(r'\bid=["\']([^"\']+)', text)
          duplicates = sorted({value for value in ids if ids.count(value) > 1})
          if duplicates:
              raise SystemExit(f'Duplicate HTML ids: {duplicates}')
          if text.count('<svg') < 6:
              raise SystemExit('Expected at least six inline SVG icons.')

          script = scripts[0]
          marker = '  initialize();'
          if script.count(marker) != 1:
              raise SystemExit('Could not locate the initialization call.')
          prefix = """globalThis.document={querySelector:()=>null,querySelectorAll:()=>[],documentElement:{dataset:{}},body:{append:()=>{},classList:{add:()=>{},remove:()=>{}},style:{}},addEventListener:()=>{},visibilityState:'visible'};globalThis.window={addEventListener:()=>{},scrollTo:()=>{}};globalThis.navigator={};globalThis.location={search:''};globalThis.localStorage={getItem:()=>null,setItem:()=>{},removeItem:()=>{}};globalThis.requestAnimationFrame=(fn)=>fn();globalThis.Node=class{};globalThis.HTMLElement=class{};globalThis.HTMLInputElement=class{};globalThis.HTMLTextAreaElement=class{};globalThis.HTMLSelectElement=class{};globalThis.Blob=class{};globalThis.URL={createObjectURL:()=>'',revokeObjectURL:()=>{}};\n"""
          runner = """
          const __results=runDeveloperTests();
          const __failures=__results.filter(result=>!result.pass);
          console.log(JSON.stringify({passed:__results.length-__failures.length,total:__results.length,failures:__failures},null,2));
          if (__results.length !== 45 || __failures.length) process.exit(1);
          """
          Path('/tmp/app.js').write_text(script, encoding='utf-8')
          Path('/tmp/app-tests.js').write_text(prefix + script.replace(marker, runner, 1), encoding='utf-8')
          PY
          node --check /tmp/app.js
          node /tmp/app-tests.js

      - name: Commit final source changes
        if: steps.apply.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Polish mobile UI and accessibility"
          git push origin HEAD:pr4-mobile-ui-polish

      - name: Run mobile browser audit
        shell: bash
        run: |
          base64 -d implementation/mobile-ui-audit.cjs.gz.b64 | gzip -d > /tmp/mobile-ui-audit.cjs
          mkdir -p /tmp/ui-audit
          npm install --prefix /tmp/ui-audit --no-save playwright@1.55.0 >/tmp/npm-install.log 2>&1
          /tmp/ui-audit/node_modules/.bin/playwright install --with-deps chromium >/tmp/playwright-install.log 2>&1
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/cairn-ui-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            curl -fsS http://127.0.0.1:4173/ >/dev/null && break
            sleep 1
          done
          NODE_PATH=/tmp/ui-audit/node_modules node /tmp/mobile-ui-audit.cjs