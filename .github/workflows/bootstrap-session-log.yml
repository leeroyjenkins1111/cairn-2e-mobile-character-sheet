name: Bootstrap session log v0.10.0

on:
  push:
    branches:
      - feature/session-log-v0.10.0
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: bootstrap-session-log
  cancel-in-progress: false

jobs:
  apply-test-finalize:
    if: ${{ !contains(github.event.head_commit.message || '', '[session-log-result]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/session-log-v0.10.0
          fetch-depth: 0

      - name: Prepare implementation script
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply_session_log.py')
          text = path.read_text(encoding='utf-8')
          old = "html = replace_once(html, '    return results;\\n  }', session_tests + '    return results;\\n  }', 'embedded session tests')"
          new = "html = replace_once(html, '    return results;\\n  }\\n\\n  function openTestResults()', session_tests + '    return results;\\n  }\\n\\n  function openTestResults()', 'embedded session tests')"
          if text.count(old) != 1:
              raise RuntimeError(f'Expected one embedded-test insertion expression, found {text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Apply session log implementation
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/apply_session_log.py 2>&1 | tee bootstrap-session-log.log

      - name: Upload bootstrap diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: session-log-bootstrap-diagnostics
          path: bootstrap-session-log.log
          if-no-files-found: warn

      - name: Show implementation diff
        run: git status --short && git diff --stat

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser engines
        run: npx playwright install --with-deps chromium webkit

      - name: Verify deployment checksums
        run: sha256sum -c checksums.sha256

      - name: Check inline JavaScript syntax
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          script = html.rsplit('<script>', 1)[1].split('</script>', 1)[0]
          Path('/tmp/cairn-inline.js').write_text(script, encoding='utf-8')
          PY
          node --check /tmp/cairn-inline.js

      - name: Run browser regression suite
        run: npm run test:ci

      - name: Remove bootstrap files and finalize
        shell: bash
        run: |
          rm -rf node_modules test-results playwright-report bootstrap-session-log.log
          git rm scripts/apply_session_log.py .github/workflows/bootstrap-session-log.yml
          git add index.html tests/app.spec.mjs README.md package.json package-lock.json service-worker.js checksums.sha256
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Implement full session log v0.10.0 [session-log-result]"
          git push origin HEAD:feature/session-log-v0.10.0
