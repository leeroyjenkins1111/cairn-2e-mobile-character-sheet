name: Bootstrap session log v0.10.0

on:
  push:
    branches:
      - feature/session-log-v0.10.0

permissions:
  contents: write

concurrency:
  group: bootstrap-session-log-commit
  cancel-in-progress: false

jobs:
  apply-commit:
    if: ${{ !contains(github.event.head_commit.message || '', '[session-log-result]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/session-log-v0.10.0
          fetch-depth: 0

      - name: Prepare implementation script
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply_session_log.py')
          text = path.read_text(encoding='utf-8')
          replacements = [
              (
                  "html = replace_once(html, '    return results;\\n  }', session_tests + '    return results;\\n  }', 'embedded session tests')",
                  "html = replace_once(html, '    return results;\\n  }\\n\\n  function openTestResults()', session_tests + '    return results;\\n  }\\n\\n  function openTestResults()', 'embedded session tests')"
              ),
              (
                  "    '      sessionPromptFor,\\n      createDemoState',",
                  "    '      sessionPromptFor,\\n      groupInventoryEntries,\\n      moveItemWithinGroup,\\n      deriveArmor,\\n      createDemoState',"
              ),
              (
                  "    '      sessionPromptFor,\\n      normalizeSessionLog,\\n      startSessionOn,\\n      appendSessionEvent,\\n      finishSessionOn,\\n      sessionReportMarkdown,\\n      classifySessionChange,\\n      createDemoState',",
                  "    '      sessionPromptFor,\\n      normalizeSessionLog,\\n      startSessionOn,\\n      appendSessionEvent,\\n      finishSessionOn,\\n      sessionReportMarkdown,\\n      classifySessionChange,\\n      groupInventoryEntries,\\n      moveItemWithinGroup,\\n      deriveArmor,\\n      createDemoState',"
              )
          ]
          for old, new in replacements:
              if text.count(old) != 1:
                  raise RuntimeError(f'Expected one script expression, found {text.count(old)}: {old[:70]}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Apply session log implementation
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/apply_session_log.py 2>&1 | tee bootstrap-session-log.log

      - name: Verify deployment checksums
        run: sha256sum -c checksums.sha256

      - name: Check inline JavaScript syntax
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          script = html.rsplit('<script>', 1)[1].split('</script>', 1)[0]
          Path('/tmp/cairn-inline.js').write_text(script, encoding='utf-8')
          PY
          node --check /tmp/cairn-inline.js

      - name: Commit implementation
        shell: bash
        run: |
          rm -f bootstrap-session-log.log
          git add index.html tests/app.spec.mjs README.md package.json package-lock.json service-worker.js checksums.sha256
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Implement full session log v0.10.0 [session-log-result]"
          git push origin HEAD:feature/session-log-v0.10.0
