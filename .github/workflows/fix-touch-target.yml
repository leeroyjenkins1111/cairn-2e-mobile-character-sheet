name: Fix 320px touch target

on:
  push:
    branches:
      - feature/product-reliability-offline-session-workflows

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message || '', '[touch-target-fix]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/product-reliability-offline-session-workflows
          fetch-depth: 0

      - name: Enforce minimum width for settings actions
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import hashlib

          index = Path('index.html')
          text = index.read_text(encoding='utf-8')
          marker = '    .settings-row-toggle { cursor: pointer; }'
          replacement = '    .settings-row .btn { min-width: 44px; }\n' + marker
          if text.count(marker) != 1:
              raise SystemExit(f'Expected one CSS marker, found {text.count(marker)}')
          text = text.replace(marker, replacement, 1)
          index.write_text(text, encoding='utf-8')

          checksums = Path('checksums.sha256')
          lines = checksums.read_text(encoding='utf-8').splitlines()
          digest = hashlib.sha256(index.read_bytes()).hexdigest()
          lines = [f'{digest}  index.html' if line.endswith('  index.html') else line for line in lines]
          checksums.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

      - name: Verify and commit
        shell: bash
        run: |
          sha256sum -c checksums.sha256
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html checksums.sha256
          git commit -m "Keep settings actions at least 44px wide [touch-target-fix]"
          git pull --rebase origin feature/product-reliability-offline-session-workflows
          git push origin HEAD:feature/product-reliability-offline-session-workflows
