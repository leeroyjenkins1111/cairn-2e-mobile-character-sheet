# Temporary bootstrap workflow; removes itself after verified generation.
name: Apply gameplay-first UX

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply gameplay-first changes
        id: apply_changes
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/apply-gameplay-first-ux.py 2>&1 | tee gameplay-first-apply.log

      - name: Upload apply diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gameplay-first-apply-diagnostics
          path: gameplay-first-apply.log
          if-no-files-found: error

      - name: Stop when changes cannot be applied
        if: steps.apply_changes.outcome == 'failure'
        run: exit 1

      - name: Verify generated structure
        shell: bash
        run: |
          grep -q "const APP_VERSION = '0.16.0'" scripts/app.js
          grep -q "function openSavePickerSheet" scripts/app.js
          grep -q "gameplay-action-grid" scripts/app.js
          grep -q "Gameplay-first UX v0.16.0" styles/app.css
          grep -q "cairn-mobile-sheet-v0.16.0" service-worker.js
          ! grep -q "renderSessionGlanceCard" scripts/app.js
          git diff --check

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser engines
        run: npx playwright install --with-deps chromium webkit

      - name: Verify deployment checksums
        run: sha256sum -c checksums.sha256

      - name: Check application JavaScript syntax
        run: node --check scripts/app.js

      - name: Run browser regression suite
        id: browser_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run test:ci 2>&1 | tee playwright-output.log

      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gameplay-first-browser-diagnostics
          path: |
            playwright-output.log
            test-results
            playwright-report
          if-no-files-found: warn

      - name: Stop when browser tests fail
        if: steps.browser_tests.outcome == 'failure'
        run: exit 1

      - name: Remove temporary and generated files
        shell: bash
        run: |
          rm -rf node_modules test-results playwright-report
          rm -f gameplay-first-apply.log playwright-output.log
          git rm scripts/apply-gameplay-first-ux.py .github/workflows/apply-gameplay-first-ux.yml

      - name: Commit verified implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html scripts/app.js styles/app.css tests/app.spec.mjs README.md package.json package-lock.json service-worker.js checksums.sha256
          git diff --cached --check
          git commit -m "v0.16.0: align UI with Cairn gameplay flow"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
