name: Finalize PR6 dice animation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'pr6-screen-logic-dice-feedback'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: pr6-screen-logic-dice-feedback
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply final animation consistency patch
        shell: bash
        run: |
          test "$(sha256sum index.html | cut -d' ' -f1)" = "e663ed2782e0da90382fefba51bd5004271978cf87cd04ffb992759741e2c855"
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          def replace_once(old, new, label):
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              text = text.replace(old, new, 1)

          replace_once(
              '`Dokładnie 0 Ochrony: rozpatrz Bliznę według ${result.hpLost} utraconej Ochrony.`',
              '`Dokładnie 0 Ochrony: rozpatrz Bliznę według ${result.hpLost} utraconych punktów Ochrony.`',
              'scar preview copy',
          )
          replace_once("function animateDiceResult(container, value, label, sides = 6) {", "function animateDiceResult(container, value, label, sides = 6, tone = 'neutral') {", 'animator signature')
          replace_once(
              """    const copy = createEl('span', { text: shouldReduceMotion() ? label : 'Kość w ruchu…' });
              const shell = createEl('div', { className: `animated-dice-result${shouldReduceMotion() ? ' settled' : ' rolling'}` }, [icon, number, copy]);
              container.replaceChildren(shell);
              if (shouldReduceMotion()) return;""",
              """    const copy = createEl('span', {
                text: shouldReduceMotion() ? label : 'Kość w ruchu…',
                className: tone === 'danger' ? 'test-fail' : tone === 'success' ? 'test-pass' : ''
              });
              const shell = createEl('div', { className: `animated-dice-result${shouldReduceMotion() ? ' settled' : ' rolling'}` }, [icon, number, copy]);
              if (!shouldReduceMotion()) shell.setAttribute('aria-hidden', 'true');
              container.replaceChildren(shell);
              if (shouldReduceMotion()) return;""",
              'animated copy',
          )
          replace_once(
              """      copy.textContent = label;
                shell.classList.remove('rolling');
                shell.classList.add('settled');""",
              """      copy.textContent = label;
                shell.removeAttribute('aria-hidden');
                shell.classList.remove('rolling');
                shell.classList.add('settled');""",
              'animator settle',
          )
          replace_once(
              """  function openResultSheet(title, value, status, details, tone = 'success') {
              const body = createEl('div', { className: 'sheet-list' });
              const result = createEl('div', { className: 'dice-result' });
              result.append(createEl('div', {}, [
                createEl('strong', { text: value }),
                createEl('span', { text: status, className: tone === 'danger' ? 'test-fail' : 'test-pass' })
              ]));
              body.append(result);
              for (const detail of details) body.append(createEl('p', { className: 'muted', text: detail }));
              openSheet({ title, body, footer: button('Zamknij', closeSheet, 'btn btn-primary btn-block') });
            }""",
              """  function openResultSheet(title, value, status, details, tone = 'success', options = {}) {
              const body = createEl('div', { className: 'sheet-list' });
              const result = createEl('div', { className: 'dice-result', attrs: { 'aria-live': 'polite', 'aria-atomic': 'true' } });
              body.append(result);
              for (const detail of details) body.append(createEl('p', { className: 'muted', text: detail }));
              openSheet({ title, body, footer: button('Zamknij', closeSheet, 'btn btn-primary btn-block') });
              const numericValue = Number(value);
              if (options.animate !== false && Number.isFinite(numericValue)) {
                animateDiceResult(result, numericValue, status, options.sides || 6, tone);
                return;
              }
              result.replaceChildren(createEl('div', {}, [
                createEl('strong', { text: value }),
                createEl('span', { text: status, className: tone === 'danger' ? 'test-fail' : tone === 'success' ? 'test-pass' : '' })
              ]));
            }""",
              'result sheet animator',
          )
          replace_once(
              """    ], result.success ? 'success' : 'danger');
              return result;
            }

            function normalizeForcedDie""",
              """    ], result.success ? 'success' : 'danger', { sides: 20 });
              return result;
            }

            function normalizeForcedDie""",
              'save result options',
          )
          replace_once(
              "openResultSheet('Spróbuj opanować panikę', roll, result.success ? 'Sukces' : 'Porażka', details, result.success ? 'success' : 'danger');",
              "openResultSheet('Spróbuj opanować panikę', roll, result.success ? 'Sukces' : 'Porażka', details, result.success ? 'success' : 'danger', { sides: 20 });",
              'panic result options',
          )
          replace_once(
              """    ], result.canAct ? 'success' : 'danger');
              announce(summary);""",
              """    ], result.canAct ? 'success' : 'danger', { sides: 20 });
              announce(summary);""",
              'first round result options',
          )
          replace_once(
              """    openResultSheet('Atak bez broni', roll, 'Obrażenia k4', [
                'Ataki w walce trafiają automatycznie.',
                'Warden odejmuje pancerz celu i rozpatruje pozostałe obrażenia.'
              ]);""",
              """    openResultSheet('Atak bez broni', roll, 'Obrażenia k4', [
                'Ataki w walce trafiają automatycznie.',
                'Warden odejmuje pancerz celu i rozpatruje pozostałe obrażenia.'
              ], 'success', { sides: 4 });""",
              'unarmed result options',
          )
          replace_once(
              "openResultSheet(guide.title, roll, interpretation, [guide.summary, 'Zapisz własny opis Blizny po uzgodnieniu szczegółów z Wardenem.']);",
              "openResultSheet(guide.title, roll, interpretation, [guide.summary, 'Zapisz własny opis Blizny po uzgodnieniu szczegółów z Wardenem.'], 'success', { sides: 6 });",
              'scar result options',
          )
          replace_once(
              """    const body = createEl('div', { className: 'sheet-list' }, [
                createEl('div', { className: 'dice-result' }, [createEl('div', {}, [createEl('strong', { text: roll }), createEl('span', { className: result.success ? 'test-pass' : 'test-fail', text: result.success ? 'Sukces' : 'Porażka' })])]),
                createEl('p', { className: 'muted', text: result.naturalSuccess ? 'Naturalne 1 zawsze oznacza sukces.' : result.naturalFailure ? 'Naturalne 20 zawsze oznacza porażkę.' : `Cel rzutu: ${target}.` }),
                createEl('p', { text: result.success ? 'Postać pozostaje w walce z obniżoną SIŁ.' : 'Porażka oznacza obrażenia krytyczne: postać może tylko pełzać i umrze w ciągu godziny bez pomocy.' })
              ]);
              if (result.success) {
                openSheet({ title: 'Rzut obronny SIŁ', body, footer: button('Zamknij', closeSheet, 'btn btn-primary btn-block') });
                return;
              }
              const later = button('Warden rozstrzygnął inaczej', closeSheet, 'btn btn-ghost');
              const mark = button('Oznacz obrażenia krytyczne', () => {
                closeSheet();
                commitChange('Oznaczono obrażenia krytyczne', next => { next.conditions.criticalDamage = true; next.conditions.stabilized = false; });
              }, 'btn btn-danger');
              openSheet({ title: 'Rzut obronny SIŁ', body, footer: createEl('div', { className: 'button-row' }, [later, mark]) });""",
              """    const animatedResult = createEl('div', { className: 'dice-result', attrs: { 'aria-live': 'polite', 'aria-atomic': 'true' } });
              const body = createEl('div', { className: 'sheet-list' }, [
                animatedResult,
                createEl('p', { className: 'muted', text: result.naturalSuccess ? 'Naturalne 1 zawsze oznacza sukces.' : result.naturalFailure ? 'Naturalne 20 zawsze oznacza porażkę.' : `Cel rzutu: ${target}.` }),
                createEl('p', { text: result.success ? 'Postać pozostaje w walce z obniżoną SIŁ.' : 'Porażka oznacza obrażenia krytyczne: postać może tylko pełzać i umrze w ciągu godziny bez pomocy.' })
              ]);
              if (result.success) {
                openSheet({ title: 'Rzut obronny SIŁ', body, footer: button('Zamknij', closeSheet, 'btn btn-primary btn-block') });
                animateDiceResult(animatedResult, roll, 'Sukces', 20, 'success');
                return;
              }
              const later = button('Warden rozstrzygnął inaczej', closeSheet, 'btn btn-ghost');
              const mark = button('Oznacz obrażenia krytyczne', () => {
                closeSheet();
                commitChange('Oznaczono obrażenia krytyczne', next => { next.conditions.criticalDamage = true; next.conditions.stabilized = false; });
              }, 'btn btn-danger');
              openSheet({ title: 'Rzut obronny SIŁ', body, footer: createEl('div', { className: 'button-row' }, [later, mark]) });
              animateDiceResult(animatedResult, roll, 'Porażka', 20, 'danger');""",
              'critical save animation',
          )
          replace_once(
              """  function performFateRoll() {
              const result = performRoll({ count: 1, sides: 6 }, 'Kość Losu');
              if (!result) return;
              const verdict = result.total >= 4 ? 'Wynik zwykle sprzyja postaciom.' : 'Wynik zwykle oznacza niepomyślny obrót.';
              renderDiceResult(result.total, `Kość Losu · ${verdict}`, { sides: 6 });
              announce(`Kość Losu: ${result.total}. ${verdict}`);
            }""",
              """  function performFateRoll() {
              let result;
              try { result = rollDice({ count: 1, sides: 6 }); }
              catch (error) { showToast(error.message, 'error'); return null; }
              const verdict = result.total >= 4 ? 'Wynik zwykle sprzyja postaciom.' : 'Wynik zwykle oznacza niepomyślny obrót.';
              const summary = `Kość Losu: ${result.total} (1k6)`;
              addDiceHistory({ type: 'dice', label: 'Kość Losu', summary, notation: '1k6', result: result.total, details: verdict });
              renderDiceResult(result.total, `Kość Losu · ${verdict}`, { sides: 6 });
              announce(`${summary}. ${verdict}`);
              return result;
            }""",
              'fate single presentation',
          )
          replace_once(
              """    test('52. Wspólny animator kości respektuje reduced motion', () => { assert(typeof animateDiceResult === 'function' && typeof shouldReduceMotion === 'function'); });
              return results;""",
              """    test('52. Wspólny animator kości respektuje reduced motion', () => { assert(typeof animateDiceResult === 'function' && typeof shouldReduceMotion === 'function'); });
              test('53. Rzuty w panelach używają wspólnego animatora', () => { assert(openResultSheet.toString().includes('animateDiceResult') && performCriticalStrengthSave.toString().includes('animateDiceResult')); });
              test('54. Kość Losu prezentuje pojedynczy wynik', () => { assert((performFateRoll.toString().match(/renderDiceResult/g) || []).length === 1 && !performFateRoll.toString().includes('performRoll(')); });
              return results;""",
              'animation regression tests',
          )
          path.write_text(text, encoding='utf-8')
          PY
          test "$(sha256sum index.html | cut -d' ' -f1)" = "50648f4e5d3543fd8da625bdd05f72429c8e1bb542b4e36e7b1340da570bfdeb"

      - name: Validate JavaScript and browser behavior
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>([\s\S]*?)</script>', text)
          if len(scripts) != 1:
              raise SystemExit(f'Expected one inline script, found {len(scripts)}')
          Path('/tmp/index-inline.js').write_text(scripts[0], encoding='utf-8')
          PY
          node --check /tmp/index-inline.js
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.54.1 >/dev/null 2>&1
          npx playwright install chromium >/dev/null
          python -m http.server 4173 >/tmp/pr6-followup-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          sleep 2
          cat >/tmp/pr6-followup-audit.cjs <<'JS'
          const { chromium } = require('playwright');
          const assert = (value, message) => { if (!value) throw new Error(message); };
          (async () => {
            const browser = await chromium.launch({ headless: true });
            try {
              const context = await browser.newContext({ viewport: { width: 390, height: 844 } });
              const page = await context.newPage();
              const errors = [];
              page.on('pageerror', error => errors.push(error.message));
              await page.goto('http://127.0.0.1:4173/?selftest=1', { waitUntil: 'networkidle' });
              const marker = page.locator('#selftestMarker');
              await marker.waitFor();
              const tests = await marker.evaluate(node => ({ passed: Number(node.dataset.passed), total: Number(node.dataset.total) }));
              assert(tests.total >= 54 && tests.passed === tests.total, `Selftests: ${tests.passed}/${tests.total}`);
              await page.getByRole('button', { name: 'Tryb demonstracyjny' }).click();
              await page.getByRole('button', { name: 'Wczytaj demo' }).click();
              await page.waitForSelector('.protection-tile');
              await page.getByRole('button', { name: /Rzut obronny Siła/ }).click();
              await page.waitForSelector('#sheet .animated-dice-result');
              await page.waitForSelector('#sheet .animated-dice-result.settled');
              await page.locator('#sheetCloseBtn').click();
              await page.getByRole('button', { name: '1. runda' }).click();
              await page.waitForSelector('#sheet .animated-dice-result.settled');
              await page.locator('#sheetCloseBtn').click();
              await page.locator('[data-nav="dice"]').click();
              await page.locator('.fate-card .btn').click();
              await page.waitForSelector('#diceResult .animated-dice-result.settled');
              assert(errors.length === 0, errors.join(' | '));
              await context.close();

              const reduced = await browser.newContext({ viewport: { width: 390, height: 844 }, reducedMotion: 'reduce' });
              const reducedPage = await reduced.newPage();
              await reducedPage.goto('http://127.0.0.1:4173/', { waitUntil: 'networkidle' });
              await reducedPage.locator('[data-nav="dice"]').click();
              await reducedPage.getByRole('button', { name: 'Rzuć kością k6' }).click();
              assert(await reducedPage.locator('#diceResult .rolling').count() === 0, 'Reduced motion started a roll animation');
              await reduced.close();
              console.log('PR6 follow-up browser audit passed');
            } finally {
              await browser.close();
            }
          })().catch(error => { console.error(error); process.exit(1); });
          JS
          NODE_PATH="$PWD/node_modules" node /tmp/pr6-followup-audit.cjs

      - name: Commit final animation consistency
        shell: bash
        run: |
          rm -f package.json package-lock.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html
          git commit -m "Animate dice results consistently"
          git push origin HEAD:pr6-screen-logic-dice-feedback
