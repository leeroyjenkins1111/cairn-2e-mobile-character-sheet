name: Bootstrap session mode PR

on:
  push:
    branches:
      - feature/session-mode-journal

permissions:
  contents: write

concurrency:
  group: bootstrap-session-mode
  cancel-in-progress: false

jobs:
  apply-test-finalize:
    if: ${{ !contains(github.event.head_commit.message || '', '[session-bootstrap-candidate]') && !contains(github.event.head_commit.message || '', '[session-bootstrap-result]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/session-mode-journal
          fetch-depth: 0

      - name: Apply session mode and journal changes
        run: python3 scripts/apply_session_mode.py

      - name: Persist candidate
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement session mode and player journal [session-bootstrap-candidate]"
          git push origin HEAD:feature/session-mode-journal

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser engines
        run: npx playwright install --with-deps chromium webkit

      - name: Verify deployment checksums
        run: sha256sum -c checksums.sha256

      - name: Check inline JavaScript syntax
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          script = html.rsplit('<script>', 1)[1].split('</script>', 1)[0]
          Path('/tmp/cairn-inline.js').write_text(script, encoding='utf-8')
          PY
          node --check /tmp/cairn-inline.js

      - name: Run browser regression suite
        run: npm run test:ci

      - name: Remove bootstrap files and finalize
        shell: bash
        run: |
          rm -f scripts/apply_session_mode.py .github/workflows/bootstrap-session-mode.yml
          rmdir scripts 2>/dev/null || true
          git add -A
          git commit -m "Finalize session mode and player journal [session-bootstrap-result]"
          git push origin HEAD:feature/session-mode-journal
