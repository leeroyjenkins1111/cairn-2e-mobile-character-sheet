name: Apply PR6 compact dice dashboard

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.head_ref == 'pr6-screen-logic-dice-feedback' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: pr6-screen-logic-dice-feedback
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply compact dice dashboard
        shell: bash
        run: |
          base64 -d .github/pr6-compact/apply.py.gz.b64 | gzip -d > /tmp/pr6_compact_apply.py
          python -m py_compile /tmp/pr6_compact_apply.py
          python /tmp/pr6_compact_apply.py

      - name: Validate inline JavaScript
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>([\s\S]*?)</script>', text)
          if len(scripts) != 1:
              raise SystemExit(f'Expected one inline script, found {len(scripts)}')
          Path('/tmp/index-inline.js').write_text(scripts[0], encoding='utf-8')
          PY
          node --check /tmp/index-inline.js

      - name: Run compact layout browser audit
        shell: bash
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.54.1 >/dev/null 2>&1
          npx playwright install chromium >/dev/null
          python -m http.server 4173 >/tmp/pr6-compact-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          sleep 2
          cat > /tmp/pr6-compact-audit.cjs <<'JS'
          const { chromium } = require('playwright');
          const assert = (condition, message) => { if (!condition) throw new Error(message); };
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 390, height: 844 } });
            const errors = [];
            page.on('pageerror', error => errors.push(String(error)));
            await page.goto('http://127.0.0.1:4173/index.html');
            await page.getByRole('button', { name: 'Tryb demonstracyjny' }).click();
            await page.getByRole('button', { name: 'Wczytaj demo' }).click();
            await page.getByRole('button', { name: 'Kości', exact: true }).click();
            await page.waitForSelector('.dice-dashboard-compact');

            const domain = await page.evaluate(() => runDeveloperTests().map(result => ({ name: result.name, pass: result.pass, error: result.error || '' })));
            const failed = domain.filter(result => !result.pass);
            assert(domain.length === 55, `Expected 55 domain tests, got ${domain.length}`);
            assert(failed.length === 0, `Domain failures: ${JSON.stringify(failed)}`);

            const fit = await page.evaluate(() => {
              const dashboard = document.querySelector('.dice-dashboard-compact').getBoundingClientRect();
              const nav = document.querySelector('.bottom-nav').getBoundingClientRect();
              return {
                dashboardBottom: Math.round(dashboard.bottom),
                navTop: Math.round(nav.top),
                horizontalOverflow: document.documentElement.scrollWidth - document.documentElement.clientWidth,
                scrollY: window.scrollY
              };
            });
            assert(fit.dashboardBottom <= fit.navTop + 1, `Dice dashboard does not fit: ${JSON.stringify(fit)}`);
            assert(fit.horizontalOverflow <= 1, `Horizontal overflow at 390px: ${fit.horizontalOverflow}`);

            const scenarioCount = await page.locator('.scenario-button').count();
            assert(scenarioCount === 6, `Expected 6 combat scenarios, got ${scenarioCount}`);
            assert(await page.locator('.combat-scenarios .btn-primary').count() === 0, 'Combat helpers must remain neutral');
            assert(await page.locator('.compact-result-card').count() === 0, 'Separate large result card still exists');

            await page.getByRole('button', { name: 'Rzuć kością k20' }).click();
            await page.waitForTimeout(560);
            const result = await page.locator('#diceResult strong').innerText();
            assert(result !== '—' && Number(result) >= 1 && Number(result) <= 20, `Unexpected k20 result: ${result}`);

            await page.emulateMedia({ reducedMotion: 'reduce' });
            await page.getByRole('button', { name: 'Rzuć kością k6' }).first().click();
            const reduced = await page.locator('#diceResult strong').innerText();
            assert(reduced !== '—', 'Reduced-motion result was not immediate');

            await page.setViewportSize({ width: 320, height: 568 });
            const narrow = await page.evaluate(() => ({
              horizontalOverflow: document.documentElement.scrollWidth - document.documentElement.clientWidth,
              buttons: [...document.querySelectorAll('#view-dice button')].filter(button => {
                const style = getComputedStyle(button);
                return style.display !== 'none' && style.visibility !== 'hidden';
              }).map(button => Math.round(button.getBoundingClientRect().height))
            }));
            assert(narrow.horizontalOverflow <= 1, `Horizontal overflow at 320px: ${narrow.horizontalOverflow}`);
            assert(narrow.buttons.every(height => height >= 44), `Touch target below 44px: ${JSON.stringify(narrow.buttons)}`);
            assert(errors.length === 0, `Browser errors: ${errors.join('\n')}`);
            await browser.close();
          })().catch(error => { console.error(error); process.exit(1); });
          JS
          NODE_PATH="$PWD/node_modules" node /tmp/pr6-compact-audit.cjs

      - name: Update Pages checksum
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib, re
          index = Path('index.html').read_bytes()
          digest = hashlib.sha256(index).hexdigest()
          path = Path('.github/workflows/deploy-pages.yml')
          text = path.read_text(encoding='utf-8')
          updated, count = re.subn(r'test "\$\(sha256sum index\.html \| cut -d\x27 \x27 -f1\)" = "[0-9a-f]{64}"', f'test "$(sha256sum index.html | cut -d\x27 \x27 -f1)" = "{digest}"', text)
          if count != 1:
              raise SystemExit(f'Expected one checksum line, found {count}')
          path.write_text(updated, encoding='utf-8')
          print(digest)
          PY

      - name: Commit compact dice dashboard
        shell: bash
        run: |
          rm -f package.json package-lock.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html .github/workflows/deploy-pages.yml
          if git diff --cached --quiet; then
            echo 'No application changes to commit.'
            exit 0
          fi
          git commit -m "Fit dice dashboard within mobile viewport"
          git push origin HEAD:pr6-screen-logic-dice-feedback
