name: Apply accessibility hardening

on:
  push:
    branches: [feature/accessibility-hardening-v0.13.0]

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/accessibility-hardening-v0.13.0
          fetch-depth: 0

      - name: Apply implementation
        run: python3 scripts/apply-accessibility-hardening.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser engines
        run: npx playwright install --with-deps chromium webkit

      - name: Verify deployment checksums
        run: sha256sum -c checksums.sha256

      - name: Check inline JavaScript syntax
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          script = html.rsplit('<script>', 1)[1].split('</script>', 1)[0]
          Path('/tmp/cairn-inline.js').write_text(script, encoding='utf-8')
          PY
          node --check /tmp/cairn-inline.js

      - name: Run browser regression suite
        id: browser_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run test:ci 2>&1 | tee playwright-output.log

      - name: Upload accessibility diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-hardening-diagnostics
          path: |
            playwright-output.log
            test-results
            playwright-report
          if-no-files-found: warn

      - name: Stop when browser tests fail
        if: steps.browser_tests.outcome == 'failure'
        run: exit 1

      - name: Remove bootstrap files
        run: git rm scripts/apply-accessibility-hardening.py .github/workflows/apply-accessibility-hardening.yml

      - name: Commit final implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md checksums.sha256 index.html package.json package-lock.json service-worker.js tests/app.spec.mjs
          git commit -m "v0.13.0: harden mobile accessibility"
          git push origin HEAD:feature/accessibility-hardening-v0.13.0
