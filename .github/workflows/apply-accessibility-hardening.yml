name: Apply accessibility hardening

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply implementation
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('README.md')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '- do trzech lokalnych punktów odzyskiwania przed importem, resetem lub odtworzeniem;',
              '- trzy lokalne punkty odzyskiwania przed importem, resetem lub odtworzeniem;',
              1
          )
          path.write_text(text, encoding='utf-8')
          PY
          python3 scripts/apply-accessibility-hardening.py 2>&1 | tee apply-output.log

      - name: Upload apply diagnostics
        if: steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-apply-diagnostics
          path: apply-output.log
          if-no-files-found: error

      - name: Stop when implementation cannot be applied
        if: steps.apply.outcome == 'failure'
        run: exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser engines
        run: npx playwright install --with-deps chromium webkit

      - name: Verify deployment checksums
        run: sha256sum -c checksums.sha256

      - name: Check inline JavaScript syntax
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          script = html.rsplit('<script>', 1)[1].split('</script>', 1)[0]
          Path('/tmp/cairn-inline.js').write_text(script, encoding='utf-8')
          PY
          node --check /tmp/cairn-inline.js

      - name: Run browser regression suite
        id: browser_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run test:ci 2>&1 | tee playwright-output.log

      - name: Upload accessibility diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-hardening-diagnostics
          path: |
            apply-output.log
            playwright-output.log
            test-results
            playwright-report
          if-no-files-found: warn

      - name: Stop when browser tests fail
        if: steps.browser_tests.outcome == 'failure'
        run: exit 1

      - name: Remove bootstrap files
        run: git rm scripts/apply-accessibility-hardening.py .github/workflows/apply-accessibility-hardening.yml

      - name: Commit final implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md checksums.sha256 index.html package.json package-lock.json service-worker.js tests/app.spec.mjs
          git commit -m "v0.13.0: harden mobile accessibility"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
