name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  browser-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser engines
        run: npx playwright install --with-deps chromium webkit

      - name: Verify deployment checksums
        run: sha256sum -c checksums.sha256

      - name: Check application JavaScript syntax
        run: node --check scripts/app.js

      - name: Run browser regression suite
        id: browser_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee playwright-output.log

      - name: Upload browser test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-test-diagnostics
          path: |
            playwright-output.log
            test-results
            playwright-report
          if-no-files-found: warn

      - name: Upload UI review screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-review-screenshots
          path: ui-review-screenshots
          if-no-files-found: error
          retention-days: 14

      - name: Fail when browser regression suite fails
        if: steps.browser_tests.outcome == 'failure'
        run: exit 1
