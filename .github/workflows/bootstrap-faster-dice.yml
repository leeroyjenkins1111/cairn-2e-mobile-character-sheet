name: Bootstrap faster dice workflow v0.11.0

on:
  push:
    branches:
      - feature/faster-dice-workflow-v0.11.0

permissions:
  contents: write

concurrency:
  group: bootstrap-faster-dice-workflow
  cancel-in-progress: false

jobs:
  apply-test-finalize:
    if: ${{ !contains(github.event.head_commit.message || '', '[faster-dice-result]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/faster-dice-workflow-v0.11.0
          fetch-depth: 0

      - name: Apply faster dice workflow
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/apply_faster_dice_workflow.py 2>&1 | tee bootstrap-faster-dice.log

      - name: Upload bootstrap diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: faster-dice-bootstrap-diagnostics
          path: bootstrap-faster-dice.log
          if-no-files-found: warn

      - name: Show implementation diff
        run: git status --short && git diff --stat

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser engines
        run: npx playwright install --with-deps chromium webkit

      - name: Verify deployment checksums
        run: sha256sum -c checksums.sha256

      - name: Check inline JavaScript syntax
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          script = html.rsplit('<script>', 1)[1].split('</script>', 1)[0]
          Path('/tmp/cairn-inline.js').write_text(script, encoding='utf-8')
          PY
          node --check /tmp/cairn-inline.js

      - name: Run browser regression suite
        run: npm run test:ci

      - name: Remove bootstrap files and finalize
        shell: bash
        run: |
          rm -rf node_modules test-results playwright-report bootstrap-faster-dice.log
          git rm scripts/apply_faster_dice_workflow.py .github/workflows/bootstrap-faster-dice.yml
          git add index.html tests/app.spec.mjs README.md package.json package-lock.json service-worker.js checksums.sha256
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Implement faster dice workflow v0.11.0 [faster-dice-result]"
          git push origin HEAD:feature/faster-dice-workflow-v0.11.0
