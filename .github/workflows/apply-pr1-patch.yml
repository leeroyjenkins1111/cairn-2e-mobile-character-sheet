name: Apply PR1 patch

on:
  push:
    branches: [pr1-rules-import-hardening]
    paths:
      - 'source/pr1-index.patch.part*'
      - '.github/workflows/apply-pr1-patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply verified patch
        shell: bash
        run: |
          cat source/pr1-index.patch.part* > /tmp/index.patch
          test "$(sha256sum /tmp/index.patch | cut -d' ' -f1)" = "e5ed658dc51a5a8a11226820d47d892408d7f46a0b849a2c4c022e4b2057a739"
          patch -p1 < /tmp/index.patch
          test "$(sha256sum index.html | cut -d' ' -f1)" = "5a6a8895210b41ab7d87ddfa1033049fcb7625e86a72ab7b0c44874e035794b3"

      - name: Commit hardened application
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Harden Cairn rules and Kettlewright import"
          git push
