name: Bootstrap product reliability PR

on:
  push:
    branches:
      - feature/product-reliability-offline-session-workflows

permissions:
  contents: write

concurrency:
  group: bootstrap-product-reliability
  cancel-in-progress: true

jobs:
  apply-and-verify:
    if: ${{ !contains(github.event.head_commit.message || '', '[generated-product-state]') && !contains(github.event.head_commit.message || '', '[bootstrap-tests-passed]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/product-reliability-offline-session-workflows
          fetch-depth: 0

      - name: Apply product enhancements
        run: python3 scripts/bootstrap_product_pr.py

      - name: Generate dependency lock
        run: npm install --package-lock-only --ignore-scripts

      - name: Persist non-workflow candidate files
        shell: bash
        run: |
          cp .github/workflows/ci.yml /tmp/generated-ci.yml
          cp .github/workflows/deploy-pages.yml /tmp/generated-deploy-pages.yml
          git checkout HEAD -- .github/workflows/deploy-pages.yml .github/workflows/bootstrap-product-pr.yml
          rm -f .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Generate product enhancement candidate [generated-product-state]"
          git push origin HEAD:feature/product-reliability-offline-session-workflows
          cp /tmp/generated-ci.yml .github/workflows/ci.yml
          cp /tmp/generated-deploy-pages.yml .github/workflows/deploy-pages.yml

      - name: Verify checksums and JavaScript syntax
        shell: bash
        run: |
          sha256sum -c checksums.sha256
          python3 - <<'PY'
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          script = html.rsplit('<script>', 1)[1].split('</script>', 1)[0]
          Path('/tmp/cairn-inline.js').write_text(script, encoding='utf-8')
          PY
          node --check /tmp/cairn-inline.js

      - name: Install browser regression dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium webkit

      - name: Run browser regression suite
        run: npm run test:ci

      - name: Record successful bootstrap verification
        shell: bash
        run: |
          printf '%s\n' 'Bootstrap browser and domain checks passed.' > BOOTSTRAP_SUCCESS.md
          git checkout HEAD -- .github/workflows/deploy-pages.yml .github/workflows/bootstrap-product-pr.yml
          rm -f .github/workflows/ci.yml
          git add BOOTSTRAP_SUCCESS.md
          git commit -m "Record successful bootstrap checks [bootstrap-tests-passed]"
          git pull --rebase origin feature/product-reliability-offline-session-workflows
          git push origin HEAD:feature/product-reliability-offline-session-workflows
