name: Bootstrap product reliability PR

on:
  push:
    branches:
      - feature/product-reliability-offline-session-workflows
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: bootstrap-product-reliability
  cancel-in-progress: false

jobs:
  apply-and-verify:
    if: ${{ !contains(github.event.head_commit.message || '', '[product-bootstrap-result]') && !contains(github.event.head_commit.message || '', '[generated-product-state]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/product-reliability-offline-session-workflows
          fetch-depth: 0

      - name: Apply product enhancements
        run: python3 scripts/bootstrap_product_pr.py

      - name: Generate dependency lock
        run: npm install --package-lock-only --ignore-scripts

      - name: Persist generated state for review and debugging
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Generate product enhancement candidate [generated-product-state]"
          git push origin HEAD:feature/product-reliability-offline-session-workflows

      - name: Verify checksums and JavaScript syntax
        shell: bash
        run: |
          sha256sum -c checksums.sha256
          python3 - <<'PY'
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          script = html.rsplit('<script>', 1)[1].split('</script>', 1)[0]
          Path('/tmp/cairn-inline.js').write_text(script, encoding='utf-8')
          PY
          node --check /tmp/cairn-inline.js

      - name: Install browser regression dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium webkit

      - name: Run browser regression suite
        run: npm run test:ci

      - name: Remove bootstrap files and commit result
        shell: bash
        run: |
          rm -f scripts/bootstrap_product_pr.py .github/workflows/bootstrap-product-pr.yml
          rmdir scripts 2>/dev/null || true
          git add -A
          git commit -m "Implement reliable backups, offline mode and session workflows [product-bootstrap-result]"
          git push origin HEAD:feature/product-reliability-offline-session-workflows
