# Temporary cleanup workflow; removes itself after restoring a reviewable PR scope.
name: Cleanup generated dependencies

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Remove generated files and protect the repository
        shell: bash
        run: |
          set -euo pipefail
          git rm -r node_modules
          cat > .gitignore <<'EOF'
          node_modules/
          test-results/
          playwright-report/
          *.log
          EOF
          git rm .github/workflows/cleanup-node-modules.yml
          git diff --check

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gitignore
          git commit -m "chore: remove generated test dependencies"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
