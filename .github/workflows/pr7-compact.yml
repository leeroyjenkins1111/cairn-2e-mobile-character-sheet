name: Debug PR7 compact layout

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  debug:
    if: github.head_ref == 'pr7-compact-dice-screen' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Run concise layout audit
        shell: bash
        run: |
          git clone --quiet --depth 1 --branch pr7-compact-dice-screen "https://x-access-token:${GH_TOKEN}@github.com/leeroyjenkins1111/cairn-2e-mobile-character-sheet.git" repo
          cd repo
          python .github/pr7-compact/apply.py
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.54.1 >/dev/null 2>&1
          npx playwright install chromium >/dev/null 2>&1
          python -m http.server 4173 >/dev/null 2>&1 &
          sleep 2
          cat > /tmp/audit.cjs <<'JS'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 390, height: 844 } });
            await page.goto('http://127.0.0.1:4173/index.html');
            await page.getByRole('button', { name: 'Tryb demonstracyjny' }).click();
            await page.getByRole('button', { name: 'Wczytaj demo' }).click();
            await page.getByRole('button', { name: 'Kości', exact: true }).click();
            await page.waitForSelector('.dice-dashboard-compact');
            const tests = await page.evaluate(() => runDeveloperTests().map(r => ({name:r.name,pass:r.pass,error:r.error||''})));
            const fit = await page.evaluate(() => {
              const d = document.querySelector('.dice-dashboard-compact').getBoundingClientRect();
              const n = document.querySelector('.bottom-nav').getBoundingClientRect();
              return {dashboardTop:Math.round(d.top),dashboardBottom:Math.round(d.bottom),height:Math.round(d.height),navTop:Math.round(n.top),overflow:document.documentElement.scrollWidth-document.documentElement.clientWidth};
            });
            console.log(JSON.stringify({testCount:tests.length,failed:tests.filter(r=>!r.pass),fit}));
            await browser.close();
          })().catch(error => { console.error(error); process.exit(1); });
          JS
          NODE_PATH="$PWD/node_modules" node /tmp/audit.cjs
