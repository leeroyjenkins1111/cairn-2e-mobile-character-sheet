name: Debug PR7 compact patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  debug:
    if: github.head_ref == 'pr7-compact-dice-screen' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Run patch with concise diagnostics
        shell: bash
        run: |
          set -o pipefail
          git clone --quiet --depth 1 --branch pr7-compact-dice-screen "https://x-access-token:${GH_TOKEN}@github.com/leeroyjenkins1111/cairn-2e-mobile-character-sheet.git" repo
          cd repo
          base64 -d .github/pr7-compact/apply.py.gz.b64 | gzip -d > /tmp/pr7_compact_apply.py
          echo "SCRIPT_COMPILED"
          python -m py_compile /tmp/pr7_compact_apply.py
          python /tmp/pr7_compact_apply.py
