name: Debug PR7 final audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  debug:
    if: github.head_ref == 'pr7-compact-dice-screen' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Print compact audit metrics
        shell: bash
        run: |
          git clone --quiet --depth 1 --branch pr7-compact-dice-screen "https://x-access-token:${GH_TOKEN}@github.com/leeroyjenkins1111/cairn-2e-mobile-character-sheet.git" repo
          cd repo
          python .github/pr7-compact/apply.py
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.54.1 >/dev/null 2>&1
          npx playwright install chromium >/dev/null 2>&1
          python -m http.server 4173 >/dev/null 2>&1 &
          sleep 2
          cat > /tmp/audit.cjs <<'JS'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 390, height: 844 } });
            const errors = [];
            page.on('pageerror', error => errors.push(String(error)));
            await page.goto('http://127.0.0.1:4173/index.html');
            await page.getByRole('button', { name: 'Tryb demonstracyjny' }).click();
            await page.getByRole('button', { name: 'Wczytaj demo' }).click();
            await page.getByRole('button', { name: 'Kości', exact: true }).click();
            await page.waitForSelector('.dice-dashboard-compact');
            const output = { scenarios: await page.locator('.scenario-button').count(), primaryScenarios: await page.locator('.combat-scenarios .btn-primary').count(), oldResult: await page.locator('.compact-result-card').count(), viewports: [] };
            await page.getByRole('button', { name: 'Rzuć kością k20' }).click();
            await page.waitForTimeout(560);
            output.k20 = await page.locator('#diceResult strong').innerText();
            await page.emulateMedia({ reducedMotion: 'reduce' });
            await page.getByRole('button', { name: 'Rzuć kością k6' }).first().click();
            output.reduced = await page.locator('#diceResult strong').innerText();
            for (const viewport of [{ width: 320, height: 568 }, { width: 375, height: 812 }, { width: 390, height: 844 }, { width: 414, height: 896 }]) {
              await page.setViewportSize(viewport);
              output.viewports.push(await page.evaluate(v => ({ ...v, overflow: document.documentElement.scrollWidth - document.documentElement.clientWidth, heights: [...document.querySelectorAll('#view-dice button')].filter(button => button.offsetParent !== null).map(button => Math.round(button.getBoundingClientRect().height)), dashboardBottom: Math.round(document.querySelector('.dice-dashboard-compact').getBoundingClientRect().bottom), navTop: Math.round(document.querySelector('.bottom-nav').getBoundingClientRect().top) }), viewport));
            }
            output.errors = errors;
            console.log(JSON.stringify(output));
            await browser.close();
          })().catch(error => { console.error(error); process.exit(1); });
          JS
          NODE_PATH="$PWD/node_modules" node /tmp/audit.cjs
