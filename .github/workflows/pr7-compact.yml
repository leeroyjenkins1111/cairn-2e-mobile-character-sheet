name: Finalize PR7 compact dice dashboard

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'pr7-compact-dice-screen' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Apply validated compact layout and commit index
        shell: bash
        run: |
          set -euo pipefail
          git clone --quiet --depth 1 --branch pr7-compact-dice-screen "https://x-access-token:${GH_TOKEN}@github.com/leeroyjenkins1111/cairn-2e-mobile-character-sheet.git" repo
          cd repo
          python -m py_compile .github/pr7-compact/apply.py
          python .github/pr7-compact/apply.py
          python - <<'PY'
          from pathlib import Path
          import hashlib, re
          text = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>([\s\S]*?)</script>', text)
          if len(scripts) != 1:
              raise SystemExit(f'Expected one inline script, found {len(scripts)}')
          Path('/tmp/index-inline.js').write_text(scripts[0], encoding='utf-8')
          print(hashlib.sha256(Path('index.html').read_bytes()).hexdigest())
          PY
          node --check /tmp/index-inline.js
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html
          git commit -m "Fit dice dashboard within mobile viewport"
          git push origin HEAD:pr7-compact-dice-screen
