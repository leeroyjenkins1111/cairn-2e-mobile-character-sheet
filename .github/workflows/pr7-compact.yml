name: Apply PR7 compact dice dashboard

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.head_ref == 'pr7-compact-dice-screen' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: pr7-compact-dice-screen
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply compact dice dashboard
        run: |
          python -m py_compile .github/pr7-compact/apply.py
          python .github/pr7-compact/apply.py

      - name: Validate inline JavaScript
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          text = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script>([\s\S]*?)</script>', text)
          if len(scripts) != 1:
              raise SystemExit(f'Expected one inline script, found {len(scripts)}')
          Path('/tmp/index-inline.js').write_text(scripts[0], encoding='utf-8')
          PY
          node --check /tmp/index-inline.js

      - name: Run compact mobile audit
        shell: bash
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.54.1 >/dev/null 2>&1
          npx playwright install chromium >/dev/null
          python -m http.server 4173 >/tmp/pr7-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          sleep 2
          cat > /tmp/pr7-audit.cjs <<'JS'
          const { chromium } = require('playwright');
          const assert = (condition, message) => { if (!condition) throw new Error(message); };

          async function loadDice(page) {
            await page.goto('http://127.0.0.1:4173/index.html');
            await page.getByRole('button', { name: 'Tryb demonstracyjny' }).click();
            await page.getByRole('button', { name: 'Wczytaj demo' }).click();
            await page.getByRole('button', { name: 'Kości', exact: true }).click();
            await page.waitForSelector('.dice-dashboard-compact');
          }

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const errors = [];
            const page = await browser.newPage({ viewport: { width: 390, height: 844 } });
            page.on('pageerror', error => errors.push(String(error)));
            await loadDice(page);

            const domain = await page.evaluate(() => runDeveloperTests().map(result => ({ name: result.name, pass: result.pass, error: result.error || '' })));
            assert(domain.length === 54, `Expected 54 domain tests, got ${domain.length}`);
            assert(domain.every(result => result.pass), `Domain failures: ${JSON.stringify(domain.filter(result => !result.pass))}`);

            const fit = await page.evaluate(() => {
              const dashboard = document.querySelector('.dice-dashboard-compact').getBoundingClientRect();
              const nav = document.querySelector('.bottom-nav').getBoundingClientRect();
              return {
                dashboardBottom: Math.round(dashboard.bottom),
                navTop: Math.round(nav.top),
                horizontalOverflow: document.documentElement.scrollWidth - document.documentElement.clientWidth
              };
            });
            assert(fit.dashboardBottom <= fit.navTop + 1, `Dice dashboard does not fit 390x844: ${JSON.stringify(fit)}`);
            assert(fit.horizontalOverflow <= 1, `Horizontal overflow at 390px: ${fit.horizontalOverflow}`);
            assert(await page.locator('.scenario-button').count() === 6, 'Expected six combat helpers');
            assert(await page.locator('.combat-scenarios .btn-primary').count() === 0, 'Combat helpers must remain neutral');
            assert(await page.locator('.compact-result-card').count() === 0, 'Separate large result card remains');

            await page.getByRole('button', { name: 'Rzuć kością k20' }).click();
            await page.waitForTimeout(560);
            const k20 = Number(await page.locator('#diceResult strong').innerText());
            assert(k20 >= 1 && k20 <= 20, `Unexpected k20 result: ${k20}`);

            await page.emulateMedia({ reducedMotion: 'reduce' });
            await page.getByRole('button', { name: 'Rzuć kością k6' }).first().click();
            assert((await page.locator('#diceResult strong').innerText()) !== '—', 'Reduced-motion result was not immediate');

            for (const viewport of [{ width: 320, height: 568 }, { width: 375, height: 812 }, { width: 414, height: 896 }]) {
              await page.setViewportSize(viewport);
              const audit = await page.evaluate(() => ({
                overflow: document.documentElement.scrollWidth - document.documentElement.clientWidth,
                heights: [...document.querySelectorAll('#view-dice button')]
                  .filter(button => getComputedStyle(button).display !== 'none')
                  .map(button => Math.round(button.getBoundingClientRect().height))
              }));
              assert(audit.overflow <= 1, `Horizontal overflow at ${viewport.width}px: ${audit.overflow}`);
              assert(audit.heights.every(height => height >= 44), `Touch target below 44px at ${viewport.width}px: ${JSON.stringify(audit.heights)}`);
            }

            assert(errors.length === 0, `Browser errors: ${errors.join('\n')}`);
            await browser.close();
          })().catch(error => { console.error(error); process.exit(1); });
          JS
          NODE_PATH="$PWD/node_modules" node /tmp/pr7-audit.cjs

      - name: Update Pages checksum
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib, re
          digest = hashlib.sha256(Path('index.html').read_bytes()).hexdigest()
          path = Path('.github/workflows/deploy-pages.yml')
          text = path.read_text(encoding='utf-8')
          updated, count = re.subn(r'test "\$\(sha256sum index\.html \| cut -d\x27 \x27 -f1\)" = "[0-9a-f]{64}"', f'test "$(sha256sum index.html | cut -d\x27 \x27 -f1)" = "{digest}"', text)
          if count != 1:
              raise SystemExit(f'Expected one checksum line, found {count}')
          path.write_text(updated, encoding='utf-8')
          print(digest)
          PY

      - name: Commit validated application source
        shell: bash
        run: |
          rm -f package.json package-lock.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html .github/workflows/deploy-pages.yml
          git commit -m "Fit dice dashboard within mobile viewport"
          git push origin HEAD:pr7-compact-dice-screen
