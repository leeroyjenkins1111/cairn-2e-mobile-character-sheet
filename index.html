<!doctype html>
<html lang="pl" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="color-scheme" content="dark light">
  <meta name="theme-color" content="#17131a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Lokalna, mobilna karta postaci do Cairn 2e z obsługą obrażeń, ekwipunku i kości.">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg">
  <title>Karta Wędrowca — Cairn 2e</title>
  <style>
    :root {
      --bg: #141116;
      --bg-elev: #1d1820;
      --surface: rgba(40, 33, 43, 0.82);
      --surface-strong: #2a222d;
      --surface-soft: rgba(57, 48, 61, 0.56);
      --text: #f3eee6;
      --muted: #b9adb9;
      --faint: #887d8b;
      --line: rgba(239, 228, 211, 0.14);
      --green: #91a982;
      --green-strong: #b4c99f;
      --amber: #d7a55d;
      --amber-strong: #f2c47f;
      --danger: #e18c84;
      --danger-bg: rgba(121, 46, 52, 0.28);
      --success: #a6c69a;
      --shadow: 0 14px 40px rgba(0, 0, 0, 0.28);
      --radius: 18px;
      --radius-sm: 12px;
      --nav-height: 74px;
      --header-height: 58px;
      --tap: 46px;
      --focus: 0 0 0 3px rgba(242, 196, 127, 0.48);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color-scheme: dark;
    }

    html[data-theme="light"] {
      --bg: #eee9e2;
      --bg-elev: #f8f4ee;
      --surface: rgba(255, 252, 247, 0.88);
      --surface-strong: #fffaf4;
      --surface-soft: rgba(224, 217, 207, 0.7);
      --text: #211c22;
      --muted: #655d67;
      --faint: #6f666f;
      --line: rgba(52, 42, 54, 0.15);
      --green: #5f7654;
      --green-strong: #435f3b;
      --amber: #a56f29;
      --amber-strong: #7b4d13;
      --danger: #9f413f;
      --danger-bg: rgba(169, 72, 67, 0.12);
      --success: #4f7048;
      --shadow: 0 14px 34px rgba(45, 35, 48, 0.12);
      color-scheme: light;
    }

    * { box-sizing: border-box; }
    html { min-width: 320px; background: var(--bg); }
    body {
      margin: 0;
      min-width: 320px;
      min-height: 100dvh;
      background:
        radial-gradient(circle at 12% 4%, rgba(87, 55, 91, 0.22), transparent 32rem),
        radial-gradient(circle at 90% 18%, rgba(67, 91, 63, 0.13), transparent 28rem),
        repeating-linear-gradient(115deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 9px),
        var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    button, input, select, textarea { font: inherit; }
    button, input, select, textarea { font-size: 16px; }
    button { -webkit-tap-highlight-color: transparent; }
    button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, [tabindex]:focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }
    button:disabled { opacity: 0.46; cursor: not-allowed; }
    a { color: var(--amber-strong); }
    .sr-only {
      position: absolute !important;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0);
      white-space: nowrap; border: 0;
    }
    .hidden { display: none !important; }

    .app-shell {
      width: min(100%, 720px);
      min-height: 100dvh;
      margin: 0 auto;
      padding-top: env(safe-area-inset-top);
      position: relative;
    }

    .app-header {
      min-height: var(--header-height);
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 14px;
      background: color-mix(in srgb, var(--bg) 86%, transparent);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line);
    }
    .brand { min-width: 0; }
    .brand-kicker {
      margin: 0;
      color: var(--green-strong);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .brand-title {
      margin: 1px 0 0;
      font-size: 1.04rem;
      line-height: 1.15;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .header-actions { display: flex; gap: 8px; }

    .main {
      padding: 14px 14px calc(var(--nav-height) + env(safe-area-inset-bottom) + 22px);
    }
    .view { display: grid; gap: 14px; min-width: 0; }
    .view > * { min-width: 0; max-width: 100%; }
    .view[hidden] { display: none; }

    .card {
      min-width: 0;
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: clip;
    }
    .card-pad { padding: 15px; }
    .card-section + .card-section { border-top: 1px solid var(--line); }
    .card-section { padding: 15px; }
    .section-head {
      min-width: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .section-head h2, .section-head h3 { margin: 0; font-size: 1rem; }
    .section-head p { margin: 0; }
    .eyebrow {
      margin: 0 0 5px;
      color: var(--green-strong);
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }
    .muted { color: var(--muted); }
    .faint { color: var(--faint); }
    .small { font-size: 0.84rem; }
    .micro { font-size: 0.74rem; }
    .wrap-anywhere { overflow-wrap: anywhere; }

    .btn {
      min-height: var(--tap);
      border: 1px solid var(--line);
      border-radius: 13px;
      padding: 10px 13px;
      background: var(--surface-soft);
      color: var(--text);
      font-weight: 760;
      line-height: 1.1;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
      touch-action: manipulation;
    }
    .btn:active, .nav-btn:active { transform: scale(0.96); filter: brightness(1.08); }
    .tap-feedback { animation: tap-feedback 180ms ease-out; }
    @keyframes tap-feedback {
      0% { transform: scale(0.96); }
      55% { transform: scale(1.015); }
      100% { transform: scale(1); }
    }
    .btn-primary {
      color: #22180c;
      background: linear-gradient(180deg, var(--amber-strong), var(--amber));
      border-color: rgba(255, 224, 174, 0.45);
    }
    html[data-theme="light"] .btn-primary { color: #fffaf2; }
    .btn-danger { background: var(--danger-bg); border-color: color-mix(in srgb, var(--danger) 56%, transparent); color: var(--danger); }
    .btn-ghost { background: transparent; box-shadow: none; }
    .btn-quiet { min-height: 44px; padding: 8px 10px; font-size: 0.86rem; }
    .btn-icon { width: var(--tap); padding: 0; display: inline-grid; place-items: center; }
    .btn-block { width: 100%; }
    .button-row { min-width: 0; display: flex; gap: 9px; flex-wrap: wrap; }
    .button-row > .btn { flex: 1 1 130px; }
    .action-grid { min-width: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .action-grid .btn { min-height: 58px; text-align: left; }
    .action-grid .btn strong { display: block; }
    .action-grid .btn span { display: block; margin-top: 3px; color: color-mix(in srgb, currentColor 72%, transparent); font-size: 0.76rem; font-weight: 600; }

    .character-hero { padding: 16px; }
    .identity-row { min-width: 0; display: grid; grid-template-columns: 62px minmax(0,1fr) auto; gap: 12px; align-items: center; }
    .avatar {
      width: 62px; height: 62px;
      border-radius: 19px;
      display: grid; place-items: center;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.12), transparent 42%),
        linear-gradient(145deg, rgba(137, 164, 119, 0.38), rgba(83, 51, 85, 0.5));
      border: 1px solid var(--line);
      color: var(--amber-strong);
      font-size: 1.65rem;
      font-weight: 900;
      text-transform: uppercase;
    }
    .character-name { margin: 0; font-size: clamp(1.32rem, 5.4vw, 1.8rem); line-height: 1.08; overflow-wrap: anywhere; }
    .character-background { margin: 4px 0 0; color: var(--muted); overflow-wrap: anywhere; }
    .demo-badge, .tag, .condition-chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 750;
    }
    .demo-badge { color: var(--amber-strong); }

    .vitals-grid { min-width: 0; display: grid; grid-template-columns: 1.3fr 0.7fr; gap: 10px; margin-top: 15px; }
    .hp-card, .mini-stat {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: color-mix(in srgb, var(--surface-strong) 76%, transparent);
    }
    .hp-card { padding: 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .hp-value { font-size: clamp(2.15rem, 11vw, 3.1rem); line-height: 0.9; font-weight: 900; letter-spacing: -0.04em; }
    .hp-value small { font-size: 0.4em; color: var(--muted); letter-spacing: 0; }
    .hp-label { font-size: 0.74rem; font-weight: 850; color: var(--green-strong); text-transform: uppercase; letter-spacing: 0.1em; }
    .mini-stats { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .mini-stat { padding: 10px 12px; }
    .mini-stat strong { font-size: 1.28rem; display: block; }
    .mini-stat span { color: var(--muted); font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; }

    .attributes-grid { min-width: 0; display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
    .attribute-btn {
      min-width: 0;
      overflow-wrap: anywhere;
      min-height: 92px;
      padding: 10px 7px;
      text-align: center;
      border-radius: 16px;
    }
    .attribute-btn .attr-label { display: block; color: var(--green-strong); font-size: 0.72rem; letter-spacing: 0.1em; }
    .attribute-btn .attr-value { display: block; margin: 4px 0 2px; font-size: 1.8rem; font-weight: 900; }
    .attribute-btn .attr-max { display: block; color: var(--muted); font-size: 0.72rem; }

    .condition-list { display: flex; flex-wrap: wrap; gap: 7px; }
    .condition-chip.active { color: var(--danger); background: var(--danger-bg); border-color: color-mix(in srgb, var(--danger) 48%, transparent); }
    .condition-chip.good { color: var(--success); }

    .alert {
      border: 1px solid color-mix(in srgb, var(--danger) 42%, transparent);
      background: var(--danger-bg);
      border-radius: var(--radius-sm);
      padding: 12px;
      color: var(--text);
    }
    .alert strong { color: var(--danger); }
    .alert p { margin: 5px 0 0; }

    .history-list, .inventory-list, .dice-history { display: grid; gap: 8px; }
    .history-item, .dice-history-item {
      padding: 11px 12px;
      border-radius: 12px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
    }
    .history-item p, .dice-history-item p { margin: 0; }
    .history-item time, .dice-history-item time { display: block; margin-top: 4px; color: var(--faint); font-size: 0.72rem; }

    .slot-meter { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
    .slot-cell { height: 13px; border: 1px solid var(--line); border-radius: 4px; background: transparent; }
    .slot-cell.filled { background: var(--green); border-color: var(--green); }
    .slot-cell.fatigue { background: var(--danger); border-color: var(--danger); }
    .usage-line { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; margin-bottom: 8px; }
    .usage-line strong { font-size: 1.25rem; }

    .inventory-item {
      min-width: 0;
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: var(--surface-soft);
      padding: 12px;
    }
    .inventory-item-head { min-width: 0; display: flex; flex-wrap: wrap; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .inventory-item h3 { margin: 0; font-size: 1rem; overflow-wrap: anywhere; }
    .inventory-item p { margin: 5px 0 0; color: var(--muted); font-size: 0.84rem; overflow-wrap: anywhere; white-space: pre-wrap; }
    .item-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; }
    .item-actions { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
    .item-actions .btn { min-width: 44px; min-height: 44px; padding: 7px 10px; flex: 0 1 auto; }
    .uses-control { display: inline-flex; align-items: center; gap: 4px; border: 1px solid var(--line); border-radius: 12px; padding: 3px; }
    .uses-control .btn { min-width: 44px; min-height: 44px; padding: 0; }
    .uses-value { min-width: 42px; text-align: center; font-weight: 850; }

    .dice-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .die-btn { min-height: 56px; font-size: 1.02rem; }
    .dice-result {
      display: grid;
      place-items: center;
      min-height: 150px;
      text-align: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at center, rgba(215,165,93,0.12), transparent 68%),
        var(--surface-soft);
    }
    .dice-result strong { display: block; font-size: 3.4rem; line-height: 1; letter-spacing: -0.05em; }
    .dice-result span { display: block; margin-top: 6px; color: var(--muted); overflow-wrap: anywhere; }

    .form-grid { display: grid; gap: 12px; }
    .form-grid.two { grid-template-columns: 1fr 1fr; }
    .field { display: grid; gap: 6px; min-width: 0; }
    .field label, .field-label { color: var(--muted); font-size: 0.78rem; font-weight: 800; }
    .field input, .field select, .field textarea {
      width: 100%;
      min-height: var(--tap);
      padding: 10px 11px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--bg-elev);
      color: var(--text);
    }
    .field textarea { min-height: 96px; resize: vertical; line-height: 1.45; }
    .field input[type="checkbox"] { width: 22px; min-height: 22px; }
    .check-row { display: flex; align-items: center; gap: 9px; min-height: 44px; }
    .help { margin: 0; color: var(--faint); font-size: 0.76rem; line-height: 1.42; }
    .validation { color: var(--danger); font-size: 0.78rem; }

    .onboarding { padding: 22px 16px; text-align: center; }
    .onboarding-mark {
      width: 78px; height: 78px;
      margin: 0 auto 15px;
      display: grid; place-items: center;
      border: 1px solid var(--line);
      border-radius: 25px;
      background: linear-gradient(145deg, rgba(145,169,130,0.26), rgba(83,51,85,0.48));
      font-size: 2rem;
    }
    .onboarding h1 { margin: 0; font-size: 1.7rem; }
    .onboarding p { color: var(--muted); line-height: 1.55; }
    .onboarding-actions { display: grid; gap: 9px; margin-top: 18px; }

    .settings-list { display: grid; gap: 1px; }
    .settings-row {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }
    .settings-row:last-child { border-bottom: 0; }
    .settings-row p { margin: 3px 0 0; }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 30;
      width: min(100%, 720px);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
      min-height: calc(var(--nav-height) + env(safe-area-inset-bottom));
      padding: 7px 8px calc(7px + env(safe-area-inset-bottom));
      background: color-mix(in srgb, var(--bg-elev) 91%, transparent);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .nav-btn {
      min-width: 0;
      overflow-wrap: anywhere;
      min-height: 56px;
      border: 0;
      border-radius: 14px;
      background: transparent;
      color: var(--muted);
      display: grid;
      place-items: center;
      align-content: center;
      gap: 3px;
      font-size: 0.72rem;
      font-weight: 800;
      cursor: pointer;
    }
    .nav-btn .nav-icon { font-size: 1.16rem; line-height: 1; }
    .nav-btn[aria-current="page"] { background: var(--surface-soft); color: var(--amber-strong); }

    .sheet-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding-top: env(safe-area-inset-top);
      background: rgba(7, 5, 8, 0.62);
    }
    .sheet-backdrop.open { display: flex; }
    .sheet {
      width: min(100%, 720px);
      max-height: min(88dvh, 850px);
      display: grid;
      grid-template-rows: auto minmax(0,1fr) auto;
      border: 1px solid var(--line);
      border-bottom: 0;
      border-radius: 24px 24px 0 0;
      background: var(--bg-elev);
      box-shadow: 0 -18px 60px rgba(0,0,0,0.36);
      overflow: hidden;
      animation: sheet-in 180ms ease-out;
    }
    .sheet-handle { width: 42px; height: 4px; border-radius: 999px; background: var(--line); margin: 8px auto 0; }
    .sheet-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 7px 14px 12px; border-bottom: 1px solid var(--line); }
    .sheet-head h2 { margin: 0; font-size: 1.08rem; }
    .sheet-body { overflow-y: auto; overscroll-behavior: contain; padding: 14px; }
    .sheet-foot { padding: 10px 14px calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid var(--line); background: var(--bg-elev); }
    .sheet-foot:empty { display: none; }
    .sheet-list { display: grid; gap: 9px; }
    .report-block { border: 1px solid var(--line); border-radius: 12px; padding: 11px; background: var(--surface-soft); }
    .report-block h3 { margin: 0 0 7px; font-size: 0.9rem; }
    .report-block ul { margin: 0; padding-left: 20px; color: var(--muted); }
    .report-block li + li { margin-top: 4px; }

    .toast {
      position: fixed;
      z-index: 150;
      left: 50%;
      bottom: calc(var(--nav-height) + env(safe-area-inset-bottom) + 12px);
      width: min(calc(100% - 28px), 520px);
      transform: translate(-50%, 14px);
      opacity: 0;
      pointer-events: none;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: var(--surface-strong);
      box-shadow: var(--shadow);
      color: var(--text);
      transition: opacity 150ms ease, transform 150ms ease;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .toast.error { border-color: color-mix(in srgb, var(--danger) 55%, transparent); }

    .test-pass { color: var(--success); }
    .test-fail { color: var(--danger); }

    @keyframes sheet-in { from { transform: translateY(24px); opacity: 0.85; } to { transform: translateY(0); opacity: 1; } }

    .identity-row > *, .vitals-grid > *, .attributes-grid > *, .action-grid > *, .section-head > *, .button-row > * { min-width: 0; }
    .character-name, .character-background, .btn, .tag, .condition-chip { overflow-wrap: anywhere; }

    @media (min-width: 620px) {
      .main { padding-left: 18px; padding-right: 18px; }
      .action-grid { grid-template-columns: repeat(4, 1fr); }
      .dice-grid { grid-template-columns: repeat(7, 1fr); }
    }

    @media (max-width: 350px) {
      .identity-row { grid-template-columns: 52px minmax(0,1fr); }
      .avatar { width: 52px; height: 52px; border-radius: 16px; }
      .identity-row > :last-child { grid-column: 1 / -1; justify-self: start; }
      .form-grid.two { grid-template-columns: 1fr; }
      .action-grid { grid-template-columns: 1fr; }
      .dice-grid { grid-template-columns: repeat(3, 1fr); }
      .main { padding-left: 10px; padding-right: 10px; }
      .app-header { padding-left: 10px; padding-right: 10px; }
    }


    /* Mobile UI/UX polish — lightweight, touch-first, no external assets. */
    h1, h2, h3, .brand-title {
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
      font-weight: 720;
      letter-spacing: -0.018em;
    }
    .view { gap: 10px; }
    .main { padding: 12px 12px calc(var(--nav-height) + env(safe-area-inset-bottom) + 18px); }
    .card {
      border-color: color-mix(in srgb, var(--line) 78%, transparent);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    }
    .card-pad { padding: 13px; }
    .card-flat,
    .card-flat.card-pad {
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      overflow: visible;
    }
    .section-head { margin-bottom: 9px; }
    .section-head h2, .section-head h3 { font-size: 1.05rem; }
    .btn { min-height: 46px; }
    .btn svg, .nav-icon svg, .onboarding-mark svg {
      width: 1.25rem;
      height: 1.25rem;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }
    .header-actions .btn svg { width: 1.35rem; height: 1.35rem; }
