<!doctype html>
<html lang="pl" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="color-scheme" content="dark light">
  <meta name="theme-color" content="#17131a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Lokalna, mobilna karta postaci do Cairn 2e z obsługą obrażeń, ekwipunku i kości.">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg">
  <title>Karta Wędrowca — Cairn 2e</title>
  <link rel="stylesheet" href="./styles/app.css">
</head>
<body>
  <a class="skip-link" href="#main">Przejdź do głównego ekranu</a>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand">
        <p class="brand-kicker">Cairn 2e</p>
        <p class="brand-title" id="headerTitle">Karta Wędrowca</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-icon btn-ghost" id="appSettingsBtn" type="button" aria-label="Ustawienia i dane" title="Ustawienia i dane"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2.8 2.8-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.2h-4V21a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1L4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9A1.7 1.7 0 0 0 3 14H2.8v-4H3a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9L4.2 7 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3A1.7 1.7 0 0 0 10 3V2.8h4V3a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1L19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.2v4H21a1.7 1.7 0 0 0-1.6 1z"></path></svg></button>
        <button class="btn btn-icon btn-ghost" id="quickUndoBtn" type="button" aria-label="Cofnij ostatnią zmianę" title="Cofnij"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M9 7H5v-4"></path><path d="M5.5 7.5a8 8 0 1 1-1.2 7.2"></path></svg></button>
      </div>
    </header>

    <main class="main" id="main" tabindex="-1" aria-label="Treść karty postaci">
      <section class="view" id="view-character" data-view="character" aria-labelledby="nav-character"></section>
      <section class="view" id="view-inventory" data-view="inventory" aria-labelledby="nav-inventory" hidden></section>
      <section class="view" id="view-dice" data-view="dice" aria-labelledby="nav-dice" hidden></section>
      <section class="view" id="view-more" data-view="more" aria-labelledby="nav-more" hidden></section>
    </main>

    <nav class="bottom-nav" aria-label="Główna nawigacja">
      <button class="nav-btn" id="nav-character" type="button" data-nav="character" aria-controls="view-character" aria-current="page"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><circle cx="12" cy="8" r="3"></circle><path d="M6.5 19c.8-3.2 2.7-5 5.5-5s4.7 1.8 5.5 5"></path></svg></span><span>Postać</span></button>
      <button class="nav-btn" id="nav-inventory" type="button" data-nav="inventory" aria-controls="view-inventory"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><path d="M5 7h14v12H5z"></path><path d="M8 7V5h8v2M9 11h6"></path></svg></span><span>Ekwipunek</span></button>
      <button class="nav-btn" id="nav-dice" type="button" data-nav="dice" aria-controls="view-dice"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><rect x="4" y="4" width="16" height="16" rx="4"></rect><path d="M9 9h.01M15 15h.01M15 9h.01M9 15h.01"></path></svg></span><span>Kości</span></button>
      <button class="nav-btn" id="nav-more" type="button" data-nav="more" aria-controls="view-more"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><circle cx="5" cy="12" r="1"></circle><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle></svg></span><span>Dziennik</span></button>
    </nav>
  </div>

  <div class="sheet-backdrop" id="sheetBackdrop" aria-hidden="true">
    <section class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
      <div>
        <div class="sheet-handle" aria-hidden="true"></div>
        <div class="sheet-head">
          <h2 id="sheetTitle" tabindex="-1">Panel</h2>
          <button class="btn btn-icon btn-ghost" id="sheetCloseBtn" type="button" aria-label="Zamknij panel">×</button>
        </div>
      </div>
      <div class="sheet-body" id="sheetBody"></div>
      <div class="sheet-foot" id="sheetFoot"></div>
    </section>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <div class="sr-only" id="liveRegion" aria-live="assertive" aria-atomic="true"></div>
  <div class="sr-only" id="viewLiveRegion" aria-live="polite" aria-atomic="true"></div>

  <input class="hidden" id="importFileInput" type="file" accept="application/json,.json">
  <input class="hidden" id="backupFileInput" type="file" accept="application/json,.json">

  <script src="./scripts/app.js"></script>
</body>
</html>
